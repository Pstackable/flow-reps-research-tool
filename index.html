<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Flow Reps Research Engine</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f5f5f5;
      color: #1a1a1a;
    }
    #root {
      min-height: 100vh;
      padding: 20px;
    }
    .progress-bar {
      width: 100%;
      height: 8px;
      background-color: #e0e0e0;
      border-radius: 4px;
      overflow: hidden;
      margin-bottom: 16px;
    }
    .progress-bar-fill {
      height: 100%;
      background-color: #0066cc;
      transition: width 0.3s ease;
    }
    .sme-alert {
      color: #cc0000;
      font-weight: 600;
      margin-bottom: 8px;
    }
    .result-row {
      border-bottom: 2px dashed #ccc;
      padding: 16px 0;
      margin: 16px 0;
    }
  </style>
</head>
<body>
  <div id="root"></div>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
  <script type="text/babel">
    const { useState, useEffect } = React;

    function ResearchEngine() {
      const [step, setStep] = useState(1);
      const [topic, setTopic] = useState('');
      const [expandedTopic, setExpandedTopic] = useState(null);
      const [keywords, setKeywords] = useState([]);
      const [currentPrompt, setCurrentPrompt] = useState('');
      const [promptExpanded, setPromptExpanded] = useState(false);
      const [websites, setWebsites] = useState([]);
      const [filteredWebsites, setFilteredWebsites] = useState([]);
      const [filterText, setFilterText] = useState('');
      const [selectedWebsites, setSelectedWebsites] = useState(new Set());
      const [batchSize, setBatchSize] = useState(100);
      const [results, setResults] = useState(null);
      const [parsedData, setParsedData] = useState([]);
      const [expandingTopic, setExpandingTopic] = useState(false);
      const [searching, setSearching] = useState(false);
      const [searchProgress, setSearchProgress] = useState(0);
      const [error, setError] = useState('');
      const [loadingWebsites, setLoadingWebsites] = useState(true);
      const [savedLists, setSavedLists] = useState([]);
      const [savingList, setSavingList] = useState(false);
      const [listName, setListName] = useState('');
      const [showSaveForm, setShowSaveForm] = useState(false);
      const [currentBatch, setCurrentBatch] = useState(0);
      const [totalBatches, setTotalBatches] = useState(0);

      useEffect(() => {
        const fetchWebsites = async () => {
          try {
            const response = await fetch('https://flow-reps-research-tool-production.up.railway.app/websites');
            if (!response.ok) throw new Error('Failed to fetch websites');
            const data = await response.json();
            setWebsites(data.websites || []);
            setFilteredWebsites(data.websites || []);
          } catch (err) {
            setError(`Error loading websites: ${err.message}`);
          } finally {
            setLoadingWebsites(false);
          }
        };

        const fetchSavedLists = async () => {
          try {
            const response = await fetch('https://flow-reps-research-tool-production.up.railway.app/saved-lists');
            if (response.ok) {
              const data = await response.json();
              setSavedLists(data.lists || []);
            }
          } catch (err) {
            console.log('Could not load saved lists');
          }
        };

        fetchWebsites();
        fetchSavedLists();
      }, []);

      useEffect(() => {
        const filtered = websites.filter(w => 
          w.name.toLowerCase().includes(filterText.toLowerCase()) ||
          w.domain.toLowerCase().includes(filterText.toLowerCase())
        );
        setFilteredWebsites(filtered);
      }, [filterText, websites]);

      const expandTopic = async () => {
        if (!topic.trim()) {
          setError('Please enter a topic');
          return;
        }

        setExpandingTopic(true);
        setError('');

        try {
          const response = await fetch('https://flow-reps-research-tool-production.up.railway.app/research', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ action: 'expandTopic', topic: topic.trim() }),
          });

          if (!response.ok) throw new Error('Failed to expand topic');
          const data = await response.json();
          const keywordArray = data.result.split(',').map(k => k.trim()).filter(k => k);
          
          setExpandedTopic(topic);
          setKeywords(keywordArray);
          setStep(2);
          setCurrentPrompt('');
          setPromptExpanded(false);
        } catch (err) {
          setError(`Error: ${err.message}`);
        } finally {
          setExpandingTopic(false);
        }
      };

      const generatePrompt = () => {
        if (selectedWebsites.size === 0) return;

        const selectedWebsitesList = Array.from(selectedWebsites).map(i => websites[i]);
        const sites = selectedWebsitesList.map(w => `${w.name} (${w.domain})`).join(', ');
        const keys = keywords.join(', ');

        const prompt = `Search these websites for content related to: "${expandedTopic}"

Websites to search: ${sites}

Keywords to look for: ${keys}

IMPORTANT INSTRUCTIONS:
1. If relevant content is found, state what was found up front (e.g., "A white paper titled..." or "A product page titled...")
2. Extract a 1-3 sentence summary of the content
3. If the website alludes to the company being a leader or subject matter expert in data center engineering, start with "SME ALERT: DATA CENTER ENGINEERING" before the findings
4. Format findings as numbered list with specific document/page titles
5. Include reference numbers in brackets if citing specific sections

If the website alludes to expertise in data center engineering, liquid cooling, advanced thermal solutions, or similar areas, include SME ALERT at the top.

If no relevant information is found, respond ONLY with: No Updates Found`;

        setCurrentPrompt(prompt);
        setPromptExpanded(true);
      };

      const toggleWebsite = (idx) => {
        const newSet = new Set(selectedWebsites);
        const actualIdx = websites.findIndex(w => w === filteredWebsites[idx]);
        if (newSet.has(actualIdx)) newSet.delete(actualIdx);
        else newSet.add(actualIdx);
        setSelectedWebsites(newSet);
      };

      const selectAll = () => {
        const newSet = new Set();
        filteredWebsites.forEach((w) => {
          const actualIdx = websites.indexOf(w);
          newSet.add(actualIdx);
        });
        setSelectedWebsites(newSet);
      };

      const selectNone = () => {
        setSelectedWebsites(new Set());
      };

      const loadList = (list) => {
        const indices = new Set();
        list.websites.forEach(savedWebsite => {
          const index = websites.findIndex(w => w.domain === savedWebsite.domain);
          if (index !== -1) indices.add(index);
        });
        setSelectedWebsites(indices);
      };

      const deleteList = async (listToDelete) => {
        if (!confirm(`Delete "${listToDelete.name}"?`)) return;
        setSavedLists(savedLists.filter(l => l.name !== listToDelete.name));
      };

      const saveList = async () => {
        if (!listName.trim()) {
          setError('Please enter a list name');
          return;
        }
        if (selectedWebsites.size === 0) {
          setError('Please select at least one website');
          return;
        }

        setSavingList(true);
        setError('');

        try {
          const selectedWebsitesList = Array.from(selectedWebsites).map(i => websites[i]);

          const response = await fetch('https://flow-reps-research-tool-production.up.railway.app/save-list', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ name: listName.trim(), websites: selectedWebsitesList }),
          });

          if (!response.ok) throw new Error('Failed to save list');

          setListName('');
          setShowSaveForm(false);
          
          const listsResponse = await fetch('https://flow-reps-research-tool-production.up.railway.app/saved-lists');
          if (listsResponse.ok) {
            const data = await listsResponse.json();
            setSavedLists(data.lists || []);
          }

          alert('List saved successfully!');
        } catch (err) {
          setError(`Error saving list: ${err.message}`);
        } finally {
          setSavingList(false);
        }
      };

      const parseResults = (rawText) => {
        const entries = [];
        const lines = rawText.split('\n');
        let currentCompany = null;
        let currentContent = [];

        lines.forEach((line) => {
          const trimmed = line.trim();
          
          const companyMatch = trimmed.match(/^(\d+\.\s+)?([A-Z][A-Z\s\-,\.]+?)(?:\s*–|\s*[-–]|\s+–)/);
          
          if (companyMatch && trimmed.length < 100) {
            if (currentCompany) {
              entries.push({
                companyName: currentCompany.name,
                website: currentCompany.website,
                content: currentContent.join('\n').trim(),
                dateFound: new Date().toLocaleDateString('en-US'),
                citationLinks: ''
              });
            }
            
            currentCompany = {
              name: companyMatch[2].trim(),
              website: ''
            };
            currentContent = [trimmed.split(/–|[-–]/)[1]?.trim() || ''].filter(x => x);
          } else if (currentCompany && trimmed.length > 0 && !trimmed.startsWith('http')) {
            if (!trimmed.match(/^\d+\./)) {
              currentContent.push(trimmed);
            }
          }
        });

        if (currentCompany) {
          entries.push({
            companyName: currentCompany.name,
            website: currentCompany.website,
            content: currentContent.join('\n').trim(),
            dateFound: new Date().toLocaleDateString('en-US'),
            citationLinks: ''
          });
        }

        return entries.filter(e => e.companyName && e.content);
      };

      const exportToExcel = () => {
        if (parsedData.length === 0) {
          alert('No data to export');
          return;
        }

        const exportData = parsedData.map(item => ({
          'Company Name': item.companyName,
          'Website': item.website,
          'Content': item.content,
          'Date': item.dateFound,
          'Citation Links': item.citationLinks
        }));

        const ws = XLSX.utils.json_to_sheet(exportData);
        ws['!cols'] = [
          { wch: 20 },
          { wch: 25 },
          { wch: 80 },
          { wch: 12 },
          { wch: 30 }
        ];

        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, 'Research Results');
        XLSX.writeFile(wb, `Research_${expandedTopic}_${new Date().toLocaleDateString()}.xlsx`);
      };

      const exportToPDF = () => {
        if (parsedData.length === 0) {
          alert('No data to export');
          return;
        }

        const element = document.createElement('div');
        element.innerHTML = `
          <div style="padding: 20px; font-family: Arial, sans-serif;">
            <h1>${expandedTopic}</h1>
            <p style="color: #666;">Date: ${new Date().toLocaleDateString()}</p>
            <div style="margin-top: 20px;">
              ${parsedData.map(item => `
                <div style="margin-bottom: 20px; page-break-inside: avoid;">
                  <div style="display: flex; justify-content: space-between; margin-bottom: 8px;">
                    <div>
                      <strong>${item.companyName}</strong><br/>
                      <a href="${item.website}" style="color: #0066cc; font-size: 12px;">${item.website || '-'}</a>
                    </div>
                    <div style="text-align: right; font-size: 12px;">
                      ${item.dateFound}
                    </div>
                  </div>
                  <div style="background-color: #f9f9f9; padding: 10px; border-left: 3px solid #0066cc; font-size: 12px; line-height: 1.5;">
                    ${item.content.replace(/\n/g, '<br/>')}
                  </div>
                  ${item.citationLinks ? `<div style="font-size: 11px; color: #0066cc; margin-top: 8px;">${item.citationLinks}</div>` : ''}
                </div>
              `).join('')}
            </div>
          </div>
        `;

        const opt = {
          margin: 10,
          filename: `Research_${expandedTopic}_${new Date().toLocaleDateString()}.pdf`,
          image: { type: 'jpeg', quality: 0.98 },
          html2canvas: { scale: 2 },
          jsPDF: { orientation: 'portrait', unit: 'mm', format: 'a4' }
        };

        html2pdf().set(opt).from(element).save();
      };

      const runSearch = async () => {
        if (selectedWebsites.size === 0) {
          setError('Please select at least one website');
          return;
        }

        setSearching(true);
        setSearchProgress(0);
        setError('');

        const selectedWebsitesList = Array.from(selectedWebsites)
          .map(i => websites[i])
          .sort(() => Math.random() - 0.5);

        const batches = [];
        for (let i = 0; i < selectedWebsitesList.length; i += batchSize) {
          batches.push(selectedWebsitesList.slice(i, i + batchSize));
        }

        setTotalBatches(batches.length);
        let allFindings = '';
        const allParsedData = [];

        for (let batchIdx = 0; batchIdx < batches.length; batchIdx++) {
          setCurrentBatch(batchIdx + 1);
          setSearchProgress(Math.round((batchIdx / batches.length) * 100));

          try {
            const batchWebsites = batches[batchIdx];
            const sites = batchWebsites.map(w => `${w.name} (${w.domain})`).join(', ');
            const keys = keywords.join(', ');

            const prompt = `Search these websites for content related to: "${expandedTopic}"

Websites to search: ${sites}

Keywords to look for: ${keys}

IMPORTANT INSTRUCTIONS:
1. If relevant content is found, state what was found up front (e.g., "A white paper titled..." or "A product page titled...")
2. Extract a 1-3 sentence summary of the content
3. If the website alludes to the company being a leader or subject matter expert in data center engineering, start with "SME ALERT: DATA CENTER ENGINEERING" before the findings
4. Format findings as numbered list with specific document/page titles
5. Include reference numbers in brackets if citing specific sections

If the website alludes to expertise in data center engineering, liquid cooling, advanced thermal solutions, or similar areas, include SME ALERT at the top.

If no relevant information is found, respond ONLY with: No Updates Found`;

            const response = await fetch('https://flow-reps-research-tool-production.up.railway.app/research', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({
                action: 'search',
                topic: expandedTopic,
                keywords,
                websites: batchWebsites,
              }),
            });

            if (!response.ok) throw new Error('Search failed');
            const data = await response.json();
            allFindings += data.result + '\n\n---\n\n';
            
            const batchParsed = parseResults(data.result);
            allParsedData.push(...batchParsed);
          } catch (err) {
            setError(`Error in batch ${batchIdx + 1}: ${err.message}`);
          }
        }

        setResults({
          topic: expandedTopic,
          keywords,
          findings: allFindings,
          timestamp: new Date().toLocaleString(),
        });

        setParsedData(allParsedData);
        setSearchProgress(100);
        setSearching(false);
        
        setTimeout(() => setStep(3), 300);
      };

      const reset = () => {
        setStep(1);
        setTopic('');
        setExpandedTopic(null);
        setKeywords([]);
        setSelectedWebsites(new Set());
        setResults(null);
        setParsedData([]);
        setError('');
        setCurrentPrompt('');
        setPromptExpanded(false);
        setListName('');
        setShowSaveForm(false);
        setFilterText('');
        setSearchProgress(0);
        setCurrentBatch(0);
        setTotalBatches(0);
      };

      return (
        <div style={{ maxWidth: '1000px', margin: '0 auto' }}>
          <h1 style={{ fontSize: '32px', fontWeight: '600', marginBottom: '24px' }}>Research Engine</h1>

          {error && (
            <div style={{ padding: '12px', backgroundColor: '#ffe6e6', color: '#cc0000', borderRadius: '6px', fontSize: '14px', marginBottom: '24px' }}>
              {error}
            </div>
          )}

          {/* STEP 1: Enter Topic */}
          {step === 1 && (
            <div>
              <div style={{ marginBottom: '24px' }}>
                <label style={{ display: 'block', marginBottom: '8px', fontWeight: '500', fontSize: '14px' }}>
                  Research topic
                </label>
                <input
                  type="text"
                  value={topic}
                  onChange={(e) => setTopic(e.target.value)}
                  onKeyPress={(e) => e.key === 'Enter' && expandTopic()}
                  placeholder="e.g., Liquid cooling for data centers"
                  style={{
                    width: '100%',
                    padding: '10px 12px',
                    border: '1px solid #ddd',
                    borderRadius: '6px',
                    fontSize: '14px',
                    marginBottom: '12px',
                  }}
                />
                <button
                  onClick={expandTopic}
                  disabled={expandingTopic || !topic.trim()}
                  style={{
                    padding: '10px 16px',
                    backgroundColor: expandingTopic ? '#ccc' : '#0066cc',
                    color: 'white',
                    border: 'none',
                    borderRadius: '6px',
                    fontSize: '14px',
                    fontWeight: '500',
                    cursor: expandingTopic ? 'not-allowed' : 'pointer',
                  }}
                >
                  {expandingTopic ? 'Expanding...' : 'Expand topic'}
                </button>
              </div>
            </div>
          )}

          {/* STEP 2: Show Keywords, Select Websites */}
          {step === 2 && (
            <div>
              <div style={{ marginBottom: '24px' }}>
                <h2 style={{ fontSize: '16px', fontWeight: '500', marginBottom: '12px' }}>Keywords for "{expandedTopic}"</h2>
                <div style={{ padding: '12px', backgroundColor: '#f0f0f0', borderRadius: '6px' }}>
                  <div style={{ display: 'flex', flexWrap: 'wrap', gap: '8px' }}>
                    {keywords.map((kw, idx) => (
                      <span
                        key={idx}
                        style={{
                          padding: '6px 12px',
                          backgroundColor: '#e6f2ff',
                          color: '#0066cc',
                          borderRadius: '12px',
                          fontSize: '13px',
                        }}
                      >
                        {kw}
                      </span>
                    ))}
                  </div>
                </div>
              </div>

              {/* Batch Size Selector */}
              <div style={{ marginBottom: '24px', padding: '12px', backgroundColor: '#e6f2ff', borderRadius: '6px', border: '1px solid #cce5ff' }}>
                <label style={{ display: 'block', marginBottom: '8px', fontWeight: '500', fontSize: '14px', color: '#0066cc' }}>
                  Batch size (websites per search)
                </label>
                <select
                  value={batchSize}
                  onChange={(e) => setBatchSize(parseInt(e.target.value))}
                  style={{
                    padding: '8px 12px',
                    border: '1px solid #cce5ff',
                    borderRadius: '6px',
                    fontSize: '14px',
                    width: '100%',
                  }}
                >
                  <option value={50}>50 websites</option>
                  <option value={100}>100 websites</option>
                  <option value={150}>150 websites</option>
                  <option value={200}>200 websites</option>
                </select>
                <p style={{ fontSize: '12px', color: '#666', marginTop: '8px' }}>
                  {selectedWebsites.size} selected websites will be searched in {Math.ceil(selectedWebsites.size / batchSize)} batches
                </p>
              </div>

              {savedLists.length > 0 && (
                <div style={{ marginBottom: '24px', padding: '12px', backgroundColor: '#f0f9ff', borderRadius: '6px', border: '1px solid #cce5ff' }}>
                  <h3 style={{ fontSize: '14px', fontWeight: '500', marginBottom: '12px', color: '#0066cc' }}>Quick load a saved list</h3>
                  <div style={{ display: 'flex', flexWrap: 'wrap', gap: '8px' }}>
                    {savedLists.map((list, idx) => (
                      <div key={idx} style={{ display: 'flex', alignItems: 'center', gap: '6px', padding: '8px 12px', backgroundColor: '#0066cc', color: 'white', borderRadius: '6px', fontSize: '12px' }}>
                        <button
                          onClick={() => loadList(list)}
                          style={{
                            background: 'none',
                            border: 'none',
                            color: 'white',
                            cursor: 'pointer',
                            fontSize: '12px',
                            padding: 0,
                          }}
                        >
                          {list.name} ({list.websites.length})
                        </button>
                        <button
                          onClick={() => deleteList(list)}
                          style={{
                            background: 'none',
                            border: 'none',
                            color: 'white',
                            cursor: 'pointer',
                            fontSize: '14px',
                            padding: '0',
                            marginLeft: '4px',
                          }}
                        >
                          ✕
                        </button>
                      </div>
                    ))}
                  </div>
                </div>
              )}

              <div style={{ marginBottom: '12px' }}>
                <label style={{ display: 'block', marginBottom: '8px', fontWeight: '500', fontSize: '14px' }}>Filter websites</label>
                <input
                  type="text"
                  value={filterText}
                  onChange={(e) => setFilterText(e.target.value)}
                  placeholder="Filter by name or domain..."
                  style={{
                    width: '100%',
                    padding: '10px 12px',
                    border: '1px solid #ddd',
                    borderRadius: '6px',
                    fontSize: '14px',
                  }}
                />
              </div>

              <div style={{ marginBottom: '12px', display: 'flex', gap: '12px', alignItems: 'center', justifyContent: 'space-between' }}>
                <div style={{ display: 'flex', gap: '12px' }}>
                  <button
                    onClick={selectAll}
                    style={{
                      color: '#0066cc',
                      background: 'none',
                      border: 'none',
                      cursor: 'pointer',
                      fontSize: '13px',
                      fontWeight: '500',
                    }}
                  >
                    Select All (filtered)
                  </button>
                  <button
                    onClick={selectNone}
                    style={{
                      color: '#0066cc',
                      background: 'none',
                      border: 'none',
                      cursor: 'pointer',
                      fontSize: '13px',
                      fontWeight: '500',
                    }}
                  >
                    Select None
                  </button>
                </div>
                <span style={{ fontSize: '13px', color: '#666' }}>
                  {selectedWebsites.size} selected
                </span>
              </div>

              {loadingWebsites ? (
                <div style={{ textAlign: 'center', color: '#666', padding: '24px' }}>Loading websites...</div>
              ) : (
                <div style={{ border: '1px solid #ddd', borderRadius: '6px', overflow: 'hidden', marginBottom: '24px', maxHeight: '400px', overflowY: 'auto' }}>
                  {filteredWebsites.map((website, idx) => {
                    const actualIdx = websites.indexOf(website);
                    return (
                      <div
                        key={idx}
                        style={{
                          display: 'flex',
                          alignItems: 'center',
                          gap: '12px',
                          padding: '12px',
                          borderBottom: idx < filteredWebsites.length - 1 ? '1px solid #eee' : 'none',
                          cursor: 'pointer',
                          backgroundColor: selectedWebsites.has(actualIdx) ? '#e6f2ff' : 'transparent',
                        }}
                        onClick={() => toggleWebsite(idx)}
                      >
                        <input
                          type="checkbox"
                          checked={selectedWebsites.has(actualIdx)}
                          onChange={() => {}}
                          style={{ cursor: 'pointer' }}
                        />
                        <div>
                          <div style={{ fontWeight: '500', fontSize: '14px' }}>{website.name}</div>
                          <div style={{ fontSize: '12px', color: '#666' }}>{website.domain}</div>
                        </div>
                      </div>
                    );
                  })}
                </div>
              )}

              {/* COLLAPSIBLE PROMPT */}
              {selectedWebsites.size > 0 && (
                <div style={{ marginBottom: '24px', padding: '12px', backgroundColor: '#fff9e6', borderRadius: '6px', border: '1px solid #ffe699' }}>
                  <button
                    onClick={() => {
                      if (!currentPrompt) {
                        generatePrompt();
                      } else {
                        setPromptExpanded(!promptExpanded);
                      }
                    }}
                    style={{
                      width: '100%',
                      textAlign: 'left',
                      padding: '12px',
                      backgroundColor: 'transparent',
                      border: 'none',
                      fontSize: '14px',
                      fontWeight: '500',
                      color: '#cc8800',
                      cursor: 'pointer',
                    }}
                  >
                    {promptExpanded ? '▼' : '▶'} Prompt
                  </button>
                  {currentPrompt && promptExpanded && (
                    <pre style={{ fontSize: '11px', whiteSpace: 'pre-wrap', wordWrap: 'break-word', color: '#333', marginTop: '8px', maxHeight: '250px', overflow: 'auto' }}>
                      {currentPrompt}
                    </pre>
                  )}
                </div>
              )}

              {/* Save List Form */}
              {selectedWebsites.size > 0 && (
                <div style={{ marginBottom: '24px', padding: '12px', backgroundColor: '#f0f9ff', borderRadius: '6px', border: '1px solid #cce5ff' }}>
                  {!showSaveForm ? (
                    <button
                      onClick={() => setShowSaveForm(true)}
                      style={{
                        padding: '10px 16px',
                        backgroundColor: '#0066cc',
                        color: 'white',
                        border: 'none',
                        borderRadius: '6px',
                        fontSize: '14px',
                        fontWeight: '500',
                        cursor: 'pointer',
                        width: '100%',
                      }}
                    >
                      Save Selected As List
                    </button>
                  ) : (
                    <div>
                      <h3 style={{ fontSize: '14px', fontWeight: '500', marginBottom: '12px' }}>Save Selected As List</h3>
                      <div style={{ display: 'flex', gap: '8px' }}>
                        <input
                          type="text"
                          value={listName}
                          onChange={(e) => setListName(e.target.value)}
                          placeholder="e.g., Valve OEMs"
                          autoFocus
                          style={{
                            flex: 1,
                            padding: '10px 12px',
                            border: '1px solid #cce5ff',
                            borderRadius: '6px',
                            fontSize: '14px',
                          }}
                        />
                        <button
                          onClick={saveList}
                          disabled={savingList || !listName.trim()}
                          style={{
                            padding: '10px 16px',
                            backgroundColor: savingList ? '#ccc' : '#0066cc',
                            color: 'white',
                            border: 'none',
                            borderRadius: '6px',
                            fontSize: '14px',
                            fontWeight: '500',
                            cursor: savingList ? 'not-allowed' : 'pointer',
                          }}
                        >
                          {savingList ? 'Saving...' : 'Save'}
                        </button>
                      </div>
                      <button
                        onClick={() => setShowSaveForm(false)}
                        style={{
                          marginTop: '8px',
                          padding: '8px 12px',
                          background: 'none',
                          border: '1px solid #cce5ff',
                          borderRadius: '6px',
                          fontSize: '13px',
                          cursor: 'pointer',
                          width: '100%',
                        }}
                      >
                        Cancel
                      </button>
                    </div>
                  )}
                </div>
              )}

              <div style={{ display: 'flex', gap: '8px' }}>
                <button
                  onClick={() => setStep(1)}
                  style={{
                    padding: '10px 16px',
                    backgroundColor: 'white',
                    color: '#666',
                    border: '1px solid #ddd',
                    borderRadius: '6px',
                    fontSize: '14px',
                    cursor: 'pointer',
                  }}
                >
                  Back
                </button>
                <button
                  onClick={runSearch}
                  disabled={searching || selectedWebsites.size === 0}
                  style={{
                    padding: '10px 16px',
                    backgroundColor: searching ? '#ccc' : '#0066cc',
                    color: 'white',
                    border: 'none',
                    borderRadius: '6px',
                    fontSize: '14px',
                    fontWeight: '500',
                    cursor: searching ? 'not-allowed' : 'pointer',
                    flex: 1,
                  }}
                >
                  {searching ? 'Searching...' : 'Search'}
                </button>
              </div>
            </div>
          )}

          {/* STEP 3: Results */}
          {step === 3 && results && (
            <div>
              {searching && (
                <div style={{ marginBottom: '24px' }}>
                  <div className="progress-bar">
                    <div className="progress-bar-fill" style={{ width: `${searchProgress}%` }}></div>
                  </div>
                  <p style={{ fontSize: '13px', color: '#666', textAlign: 'center' }}>
                    Searching batch {currentBatch}/{totalBatches}... {Math.round(searchProgress)}%
                  </p>
                </div>
              )}

              <div style={{ marginBottom: '24px' }}>
                <h2 style={{ fontSize: '18px', fontWeight: '500', marginBottom: '8px' }}>Results for "{results.topic}"</h2>
                <p style={{ fontSize: '13px', color: '#666', margin: 0 }}>{results.timestamp}</p>
              </div>

              {/* Results Display */}
              {parsedData.length > 0 && (
                <div style={{ marginBottom: '24px', border: '1px solid #ddd', borderRadius: '6px', padding: '16px', backgroundColor: '#fafafa' }}>
                  {parsedData.map((item, idx) => (
                    <div key={idx} className="result-row">
                      <div style={{ display: 'flex', justifyContent: 'space-between', gap: '20px', marginBottom: '12px' }}>
                        <div style={{ flex: '0 0 200px' }}>
                          <strong style={{ fontSize: '14px' }}>{item.companyName}</strong><br/>
                          <a href={item.website} style={{ color: '#0066cc', fontSize: '12px', textDecoration: 'none' }}>
                            {item.website || '-'}
                          </a>
                        </div>
                        <div style={{ flex: 1 }}>
                          <div style={{ whiteSpace: 'pre-wrap', wordWrap: 'break-word', fontSize: '13px', lineHeight: '1.5' }}>
                            {item.content}
                          </div>
                        </div>
                        <div style={{ flex: '0 0 100px', textAlign: 'right', fontSize: '12px', color: '#666' }}>
                          {item.dateFound}
                        </div>
                      </div>
                      {item.citationLinks && (
                        <div style={{ fontSize: '11px', color: '#0066cc', marginTop: '8px' }}>
                          {item.citationLinks}
                        </div>
                      )}
                    </div>
                  ))}
                </div>
              )}

              {/* Export Buttons */}
              <div style={{ display: 'flex', gap: '8px', marginBottom: '24px' }}>
                <button
                  onClick={exportToExcel}
                  style={{
                    flex: 1,
                    padding: '10px 16px',
                    backgroundColor: '#28a745',
                    color: 'white',
                    border: 'none',
                    borderRadius: '6px',
                    fontSize: '14px',
                    fontWeight: '500',
                    cursor: 'pointer',
                  }}
                >
                  📊 Export to Excel
                </button>
                <button
                  onClick={exportToPDF}
                  style={{
                    flex: 1,
                    padding: '10px 16px',
                    backgroundColor: '#dc3545',
                    color: 'white',
                    border: 'none',
                    borderRadius: '6px',
                    fontSize: '14px',
                    fontWeight: '500',
                    cursor: 'pointer',
                  }}
                >
                  📄 Export to PDF
                </button>
              </div>

              <button
                onClick={reset}
                style={{
                  padding: '10px 16px',
                  backgroundColor: '#0066cc',
                  color: 'white',
                  border: 'none',
                  borderRadius: '6px',
                  fontSize: '14px',
                  fontWeight: '500',
                  cursor: 'pointer',
                  width: '100%',
                }}
              >
                New research
              </button>
            </div>
          )}
        </div>
      );
    }

    ReactDOM.render(<ResearchEngine />, document.getElementById('root'));
  </script>
</body>
</html>
