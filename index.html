<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Flow Reps Research Engine</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { 
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; 
      background: #f5f5f5; 
      color: #1a1a1a; 
    }
    #root { min-height: 100vh; padding: 20px; }
    .container { max-width: 1200px; margin: 0 auto; }
    .header { display: flex; align-items: center; gap: 12px; margin-bottom: 32px; }
    .header h1 { font-size: 36px; font-weight: 600; margin: 0; }
    .badge { background-color: #ffeb3b; color: #000; padding: 6px 14px; border-radius: 12px; font-size: 11px; font-weight: 700; }
    
    .alert { padding: 14px; border-radius: 8px; margin-bottom: 24px; font-size: 14px; }
    .alert-error { background-color: #fee; color: #c00; border: 1px solid #fcc; }
    .alert-info { background-color: #eff; color: #066; border: 1px solid #cff; }
    .alert-success { background-color: #efe; color: #060; border: 1px solid #cfc; }
    .alert-warning { background-color: #ffc; color: #630; border: 1px solid #fc0; }
    
    .form-group { margin-bottom: 24px; }
    .form-group label { display: block; margin-bottom: 8px; font-weight: 500; font-size: 14px; color: #333; }
    
    input[type="text"] { 
      width: 100%; 
      padding: 12px; 
      border: 1px solid #ddd; 
      border-radius: 6px; 
      font-size: 14px; 
      margin-bottom: 12px;
      font-family: inherit;
    }
    
    input[type="text"]:focus {
      outline: none;
      border-color: #0066cc;
      box-shadow: 0 0 0 3px rgba(0, 102, 204, 0.1);
    }
    
    button { 
      padding: 12px 20px; 
      border: none; 
      border-radius: 6px; 
      font-size: 14px; 
      font-weight: 500; 
      cursor: pointer;
      transition: all 0.2s;
    }
    
    .btn-primary { 
      background-color: #0066cc; 
      color: white; 
    }
    .btn-primary:hover:not(:disabled) { 
      background-color: #0052a3; 
    }
    .btn-primary:disabled { 
      background-color: #ccc; 
      cursor: not-allowed; 
    }
    
    .btn-secondary { 
      background-color: white; 
      color: #666; 
      border: 1px solid #ddd; 
    }
    .btn-secondary:hover:not(:disabled) { 
      background-color: #f5f5f5; 
    }
    
    .keywords { 
      display: flex; 
      flex-wrap: wrap; 
      gap: 8px; 
      padding: 12px; 
      background-color: #f9f9f9; 
      border-radius: 6px;
      border: 1px solid #eee;
    }
    .keyword { 
      padding: 6px 12px; 
      background-color: #e6f2ff; 
      color: #0066cc; 
      border-radius: 12px; 
      font-size: 13px; 
      font-weight: 500;
    }
    
    .website-list { 
      padding: 12px; 
      background-color: #f9f9f9; 
      border-radius: 6px; 
      border: 1px solid #eee; 
      max-height: 300px; 
      overflow: auto; 
    }
    .website-item { 
      font-size: 13px; 
      padding: 10px 0; 
      border-bottom: 1px solid #eee; 
    }
    .website-item:last-child { 
      border-bottom: none; 
    }
    .website-name { 
      font-weight: 500; 
      color: #000;
    }
    .website-domain { 
      color: #0066cc; 
      font-size: 12px; 
    }
    
    .raw-results { 
      border: 2px solid #333; 
      border-radius: 6px; 
      margin-bottom: 24px; 
      overflow: hidden; 
    }
    .raw-header { 
      background-color: #333; 
      color: white; 
      padding: 12px; 
      font-weight: 500; 
      font-size: 14px; 
      cursor: pointer;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .raw-content { 
      background-color: #000; 
      color: #0f0; 
      padding: 16px; 
      max-height: 600px; 
      overflow: auto; 
      white-space: pre-wrap; 
      word-wrap: break-word; 
      font-size: 12px; 
      line-height: 1.6; 
      font-family: 'Courier New', monospace;
      min-height: 80px;
    }
    
    .button-group { 
      display: flex; 
      gap: 8px; 
    }
    .button-group button { 
      flex: 1; 
    }
    
    h2 { 
      font-size: 18px; 
      font-weight: 600; 
      margin-bottom: 12px; 
      color: #000;
    }
    h3 { 
      font-size: 14px; 
      font-weight: 600; 
      margin-bottom: 12px; 
      color: #333;
    }
    p { 
      font-size: 13px; 
      color: #666; 
      margin: 0; 
    }
    
    .spinner {
      display: inline-block;
      width: 14px;
      height: 14px;
      border: 2px solid rgba(255,255,255,0.3);
      border-radius: 50%;
      border-top-color: white;
      animation: spin 0.8s linear infinite;
    }
    
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div id="root"></div>
  
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  
  <script type="text/babel">
    const { useState, useEffect } = React;

    function App() {
      const [step, setStep] = useState(1);
      const [topic, setTopic] = useState('');
      const [expandedTopic, setExpandedTopic] = useState(null);
      const [keywords, setKeywords] = useState([]);
      const [websites, setWebsites] = useState([]);
      const [selectedWebsites, setSelectedWebsites] = useState(new Set());
      const [results, setResults] = useState(null);
      const [expandingTopic, setExpandingTopic] = useState(false);
      const [searching, setSearching] = useState(false);
      const [error, setError] = useState('');
      const [loadingWebsites, setLoadingWebsites] = useState(true);

      useEffect(() => {
        fetchWebsites();
      }, []);

      const fetchWebsites = async () => {
        try {
          const response = await fetch('https://flow-reps-research-tool-production.up.railway.app/websites');
          
          if (!response.ok) throw new Error('Failed to load websites');
          
          const data = await response.json();
          setWebsites(data.websites || []);
        } catch (err) {
          setError(`Error loading websites: ${err.message}`);
        } finally {
          setLoadingWebsites(false);
        }
      };

      const handleExpandTopic = async () => {
        if (!topic.trim()) {
          setError('Please enter a topic');
          return;
        }

        setExpandingTopic(true);
        setError('');

        try {
          const response = await fetch('https://flow-reps-research-tool-production.up.railway.app/research', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ 
              action: 'expandTopic', 
              topic: topic.trim() 
            }),
          });

          if (!response.ok) throw new Error('Failed to expand topic');
          
          const data = await response.json();
          const keywordArray = data.result.split(',').map(k => k.trim()).filter(k => k);

          setExpandedTopic(topic);
          setKeywords(keywordArray);

          // Auto-select first 10 websites for testing
          const newSet = new Set();
          for (let i = 0; i < Math.min(10, websites.length); i++) {
            newSet.add(i);
          }
          setSelectedWebsites(newSet);

          setStep(2);
        } catch (err) {
          setError(`Error: ${err.message}`);
        } finally {
          setExpandingTopic(false);
        }
      };

      const handleSearch = async () => {
        if (selectedWebsites.size === 0) {
          setError('No websites selected');
          return;
        }

        setSearching(true);
        setError('');

        try {
          const selectedWebsitesList = Array.from(selectedWebsites).map(i => websites[i]);

          const response = await fetch('https://flow-reps-research-tool-production.up.railway.app/research', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              action: 'search',
              topic: expandedTopic,
              keywords,
              websites: selectedWebsitesList,
            }),
          });

          if (!response.ok) throw new Error('Search failed');

          const data = await response.json();

          setResults({
            topic: expandedTopic,
            findings: data.result,
            websiteList: selectedWebsitesList.map(w => `${w.name} (${w.domain})`).join('\n'),
            websiteCount: selectedWebsitesList.length,
            timestamp: new Date().toLocaleString(),
          });

          setStep(3);
        } catch (err) {
          setError(`Search error: ${err.message}`);
        } finally {
          setSearching(false);
        }
      };

      const handleReset = () => {
        setStep(1);
        setTopic('');
        setExpandedTopic(null);
        setKeywords([]);
        setSelectedWebsites(new Set());
        setResults(null);
        setError('');
      };

      return (
        <div className="container">
          <div className="header">
            <h1>Research Engine</h1>
            <span className="badge">BETA</span>
          </div>

          {error && <div className="alert alert-error">{error}</div>}

          {step === 1 && (
            <div>
              {loadingWebsites && (
                <div className="alert alert-info">
                  ⏳ Loading websites...
                </div>
              )}

              <div className="form-group">
                <label>What are you researching?</label>
                <input
                  type="text"
                  value={topic}
                  onChange={(e) => setTopic(e.target.value)}
                  onKeyPress={(e) => e.key === 'Enter' && handleExpandTopic()}
                  placeholder="e.g., ball valves, liquid cooling, piping systems"
                  disabled={expandingTopic}
                />
                <button 
                  className="btn-primary" 
                  onClick={handleExpandTopic}
                  disabled={expandingTopic || !topic.trim()}
                >
                  {expandingTopic ? (
                    <>
                      <span className="spinner"></span> Expanding...
                    </>
                  ) : (
                    'Expand topic'
                  )}
                </button>
              </div>

              <div className="alert alert-info">
                <strong>💡 How it works:</strong><br/>
                1. Enter a research topic<br/>
                2. We'll expand it into keywords<br/>
                3. Auto-select the first 10 companies<br/>
                4. Search their websites for related content
              </div>
            </div>
          )}

          {step === 2 && (
            <div>
              <div className="alert alert-warning">
                <strong>📋 Test Mode:</strong> Auto-selected first {selectedWebsites.size} websites (total: {websites.length})
              </div>

              <div className="form-group">
                <h2>Keywords for "{expandedTopic}"</h2>
                <div className="keywords">
                  {keywords.length > 0 ? (
                    keywords.map((kw, idx) => (
                      <span key={idx} className="keyword">{kw}</span>
                    ))
                  ) : (
                    <span style={{ color: '#666' }}>No keywords</span>
                  )}
                </div>
              </div>

              <div className="form-group">
                <h3>Selected Companies ({selectedWebsites.size})</h3>
                <div className="website-list">
                  {selectedWebsites.size > 0 ? (
                    Array.from(selectedWebsites).map(idx => (
                      <div key={idx} className="website-item">
                        <div className="website-name">✓ {websites[idx]?.name}</div>
                        <div className="website-domain">{websites[idx]?.domain}</div>
                      </div>
                    ))
                  ) : (
                    <div style={{ color: '#666' }}>No websites selected</div>
                  )}
                </div>
              </div>

              <div className="button-group">
                <button className="btn-secondary" onClick={() => setStep(1)}>Back</button>
                <button 
                  className="btn-primary"
                  onClick={handleSearch}
                  disabled={searching || selectedWebsites.size === 0}
                >
                  {searching ? (
                    <>
                      <span className="spinner"></span> Searching...
                    </>
                  ) : (
                    'Search'
                  )}
                </button>
              </div>
            </div>
          )}

          {step === 3 && results && (
            <div>
              <div className="alert alert-success">
                <strong>✓ Search Complete!</strong> Searched {results.websiteCount} companies
              </div>

              <h2>Results for "{results.topic}"</h2>
              <p>{results.timestamp}</p>

              <div style={{ marginBottom: '24px', padding: '12px', backgroundColor: '#f9f9f9', borderRadius: '6px', border: '1px solid #eee' }}>
                <strong style={{ fontSize: '13px' }}>Websites searched:</strong>
                <pre style={{ fontSize: '12px', color: '#666', margin: '8px 0 0 0', whiteSpace: 'pre-wrap', wordWrap: 'break-word', fontFamily: 'monospace' }}>
                  {results.websiteList}
                </pre>
              </div>

              <div className="raw-results">
                <div className="raw-header">
                  📄 Results ({results.findings.length} characters)
                  <span style={{ fontSize: '11px', color: '#aaa' }}>via Perplexity</span>
                </div>
                <div className="raw-content">{results.findings}</div>
              </div>

              <button className="btn-primary" onClick={handleReset} style={{ width: '100%' }}>
                Search another topic
              </button>
            </div>
          )}
        </div>
      );
    }

    ReactDOM.render(<App />, document.getElementById('root'));
  </script>
</body>
</html>
