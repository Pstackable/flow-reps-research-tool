<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Flow Reps Research Engine</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f5f5f5; color: #1a1a1a; }
    #root { min-height: 100vh; padding: 20px; }
    .container { max-width: 1200px; margin: 0 auto; }
    .header { display: flex; align-items: center; gap: 12px; margin-bottom: 32px; }
    .header h1 { font-size: 36px; font-weight: 600; margin: 0; }
    .badge { background-color: #ffeb3b; color: #000; padding: 6px 14px; border-radius: 12px; font-size: 11px; font-weight: 700; }
    .alert { padding: 14px; border-radius: 8px; margin-bottom: 24px; font-size: 14px; }
    .alert-error { background-color: #fee; color: #c00; border: 1px solid #fcc; }
    .alert-info { background-color: #eff; color: #066; border: 1px solid #cff; }
    .alert-success { background-color: #efe; color: #060; border: 1px solid #cfc; }
    .form-group { margin-bottom: 24px; }
    .form-group label { display: block; margin-bottom: 8px; font-weight: 500; font-size: 14px; color: #333; }
    input[type="text"] { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 6px; font-size: 14px; font-family: inherit; background: white; color: #1a1a1a; }
    input:focus { outline: none; border-color: #0066cc; box-shadow: 0 0 0 3px rgba(0, 102, 204, 0.1); }
    button { padding: 12px 20px; border: none; border-radius: 6px; font-size: 14px; font-weight: 500; cursor: pointer; transition: all 0.2s; }
    .btn-primary { background-color: #0066cc; color: white; }
    .btn-primary:hover:not(:disabled) { background-color: #0052a3; }
    .btn-primary:disabled { background-color: #ccc; cursor: not-allowed; }
    .btn-secondary { background-color: white; color: #666; border: 1px solid #ddd; }
    .btn-secondary:hover:not(:disabled) { background-color: #f5f5f5; }
    .btn-download { background-color: #28a745; color: white; }
    .btn-download:hover:not(:disabled) { background-color: #218838; }
    .btn-history { background-color: #6c757d; color: white; }
    .btn-history:hover { background-color: #5a6268; }
    .keywords { display: flex; flex-wrap: wrap; gap: 8px; padding: 12px; background-color: #f9f9f9; border-radius: 6px; border: 1px solid #eee; }
    .keyword { padding: 6px 12px; background-color: #e6f2ff; color: #0066cc; border-radius: 12px; font-size: 13px; font-weight: 500; }
    .website-selector { padding: 12px; background-color: #f9f9f9; border-radius: 6px; border: 1px solid #eee; max-height: 400px; overflow-y: auto; }
    .website-checkbox { display: flex; align-items: center; padding: 8px 0; font-size: 13px; }
    .website-checkbox input { margin-right: 8px; cursor: pointer; }
    .website-checkbox label { cursor: pointer; flex: 1; }
    .results-table { width: 100%; border-collapse: collapse; background: white; border: 1px solid #ddd; border-radius: 6px; overflow: hidden; margin-bottom: 24px; }
    .results-table thead { background-color: #333; color: white; }
    .results-table th { padding: 12px; text-align: left; font-weight: 600; font-size: 13px; }
    .results-table td { padding: 12px; border-bottom: 1px solid #eee; font-size: 13px; }
    .results-table tbody tr:hover { background-color: #f9f9f9; }
    .history-list { padding: 12px; background-color: white; border: 1px solid #ddd; border-radius: 6px; max-height: 500px; overflow-y: auto; }
    .history-item { padding: 12px; border-bottom: 1px solid #eee; cursor: pointer; }
    .history-item:hover { background-color: #f9f9f9; }
    .history-item-title { font-weight: 600; color: #000; }
    .history-item-meta { font-size: 12px; color: #666; margin-top: 4px; }
    .progress-container { margin-bottom: 24px; padding: 20px; background: white; border-radius: 8px; border: 1px solid #ddd; }
    .progress-bar { width: 100%; height: 40px; background-color: #eee; border-radius: 8px; overflow: hidden; margin-bottom: 12px; }
    .progress-fill { height: 100%; background: linear-gradient(90deg, #0066cc, #0052a3); transition: width 0.3s; display: flex; align-items: center; justify-content: center; color: white; font-size: 13px; font-weight: 600; }
    .progress-text { font-size: 16px; font-weight: 600; color: #0066cc; margin-bottom: 8px; }
    .progress-meta { font-size: 13px; color: #666; }
    .company-now { padding: 12px; background-color: #f0f8ff; border-left: 4px solid #0066cc; border-radius: 4px; font-size: 14px; margin-top: 12px; }
    .company-now strong { color: #0066cc; }
    .button-group { display: flex; gap: 8px; margin-top: 12px; }
    .button-group button { flex: 1; }
    h2 { font-size: 18px; font-weight: 600; margin-bottom: 12px; color: #000; }
    h3 { font-size: 14px; font-weight: 600; margin-bottom: 12px; color: #333; }
    p { font-size: 13px; color: #666; margin: 0; }
    .spinner { display: inline-block; width: 14px; height: 14px; border: 2px solid rgba(255,255,255,0.3); border-radius: 50%; border-top-color: white; animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div id="root"></div>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
  <script type="text/babel">
    const { useState, useEffect } = React;
    
    function App() {
      const [step, setStep] = useState(1);
      const [topic, setTopic] = useState('');
      const [keywords, setKeywords] = useState([]);
      const [websites, setWebsites] = useState([]);
      const [selectedWebsites, setSelectedWebsites] = useState(new Set());
      const [results, setResults] = useState(null);
      const [history, setHistory] = useState([]);
      const [expanding, setExpanding] = useState(false);
      const [searching, setSearching] = useState(false);
      const [progress, setProgress] = useState({ current: 0, total: 0, current_company: '', current_domain: '' });
      const [error, setError] = useState('');
      const [loading, setLoading] = useState(true);

      const PROMPT = `I need your help search for PDFs, white papers, technical blog posts, or product pages related to either of the below two topics on this SPECIFIC website home page or its subdomains here, {{website_url}}.

Topic #1: Liquid Cooling for Data Centers
Keywords that you can look for (exactly and/or semantically): "liquid-cooled servers," "direct-to-chip," "immersion cooling," "data center cooling systems," "AI GPU cooling," "TDP," "facility water system," "rear-door heat exchanger," "CDU," "dielectric fluid," "thermal ride-through," "sustainable data center."

Topic #2: Valve Usage in Modern Applications
Keywords that you can look for (exactly and/or semantically): "quarter-turn valves," "ball valve," "butterfly valve," "plug valve," "globe valve," "needle valve," "gate valve," "pinch valve," "rotary valves," "valve control," "valve automation," "valves in data centers," "valves in food and beverage," "valves in pharmaceutical," "valves in semiconductor," "valves in pulp and paper," "valves in tire plants," "valves in hospitals," "valves in high-rise buildings," "valve application case study," "valve case studies."

Important Action if a relevant source is found:
1.) First: State what was found up front (e.g. "A _____ was found)
2.) Extract a 1–3 sentence summary of the content.
3.) If the website alludes to the company being a leader or subject matter expert in data-center engineering, before everything else say, "SME ALERT: DATA CENTER ENGINEERING"

If you find confirmed updates, do not say anything more than the directions above. I don't need to hear things like "No other recent updates were found," or "If you want me to provide links or extract more detailed technical insights from any specific document or section mentioned above just let me know!"

If you do not find any relevant information that matches what I asked for, only respond with: No Updates Found`;

      useEffect(() => {
        fetch('https://flow-reps-research-tool-production.up.railway.app/websites')
          .then(r => r.json())
          .then(d => setWebsites(d.websites || []))
          .catch(e => setError(e.message))
          .finally(() => setLoading(false));
      }, []);

      const loadHistory = async () => {
        try {
          const response = await fetch('https://atddexueqapijmevomam.supabase.co/rest/v1/search_results?select=*&order=search_date.desc&limit=50', {
            headers: {
              'Authorization': 'Bearer eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImF0ZGRleHVlcWFwaWptZXZvbWFtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODQ2MzIxNzIsImV4cCI6MjEwMDIwODE3Mn0.qCdUFLJuYhTSinVJ9v3h9-rmui3vOZmTn8w4Kdi9oVY',
              'apikey': 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImF0ZGRleHVlcWFwaWptZXZvbWFtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODQ2MzIxNzIsImV4cCI6MjEwMDIwODE3Mn0.qCdUFLJuYhTSinVJ9v3h9-rmui3vOZmTn8w4Kdi9oVY',
            }
          });
          const data = await response.json();
          setHistory(data || []);
          setStep(4);
        } catch (e) {
          setError('Failed to load history: ' + e.message);
        }
      };

      const expandTopic = async () => {
        if (!topic.trim()) { setError('Please enter a topic'); return; }
        setExpanding(true);
        setError('');
        try {
          const r = await fetch('https://flow-reps-research-tool-production.up.railway.app/research', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ action: 'expandTopic', topic: topic.trim() })
          });
          const d = await r.json();
          const kw = d.result.split(',').map(k => k.trim()).filter(k => k);
          setKeywords(kw);
          setStep(2);
        } catch (e) {
          setError(e.message);
        } finally {
          setExpanding(false);
        }
      };

      const toggleWebsite = (idx) => {
        const newSet = new Set(selectedWebsites);
        if (newSet.has(idx)) {
          newSet.delete(idx);
        } else {
          if (newSet.size < 100) {
            newSet.add(idx);
          } else {
            setError('Max 100 websites selected');
            return;
          }
        }
        setSelectedWebsites(newSet);
      };

      const search = async () => {
        if (selectedWebsites.size === 0) { setError('Select at least 1 website'); return; }
        setSearching(true);
        setProgress({ current: 0, total: selectedWebsites.size, current_company: '', current_domain: '' });
        setError('');
        try {
          const list = Array.from(selectedWebsites).map(i => websites[i]);
          const params = new URLSearchParams({
            topic: topic,
            keywords: JSON.stringify(keywords),
            websites: JSON.stringify(list),
            customPrompt: PROMPT,
            action: 'search'
          });
          
          const eventSource = new EventSource('https://flow-reps-research-tool-production.up.railway.app/research-stream?' + params.toString());

          eventSource.onmessage = (event) => {
            try {
              const data = JSON.parse(event.data);
              if (data.type === 'progress') {
                setProgress({
                  current: data.current,
                  total: data.total,
                  current_company: data.current_company,
                  current_domain: data.current_domain
                });
              } else if (data.type === 'complete') {
                eventSource.close();
                setResults({ 
                  topic: data.topic, 
                  results: data.results, 
                  searchDate: data.searchDate, 
                  websiteCount: list.length 
                });
                setStep(3);
                setSearching(false);
              } else if (data.type === 'error') {
                eventSource.close();
                setError(data.error);
                setSearching(false);
              }
            } catch (e) {
              console.error('Parse error:', e);
            }
          };

          eventSource.onerror = () => {
            eventSource.close();
            setError('Connection error during search');
            setSearching(false);
          };
        } catch (e) {
          setError(e.message);
          setSearching(false);
        }
      };

      const downloadExcel = (resultsToDownload = results) => {
        if (!resultsToDownload) return;
        try {
          const data = resultsToDownload.results.map(r => ({ 'Company Name': r.companyName, 'Website': r.domain, 'Summary': r.summary, 'Date': r.dateFound, 'Links': r.citationLinks }));
          const wb = XLSX.utils.book_new();
          const ws = XLSX.utils.json_to_sheet(data);
          ws['!cols'] = [{ wch: 25 }, { wch: 30 }, { wch: 50 }, { wch: 18 }, { wch: 40 }];
          XLSX.utils.book_append_sheet(wb, ws, 'Results');
          const ts = new Date().toISOString().split('T')[0];
          XLSX.writeFile(wb, `Results_${resultsToDownload.topic.replace(/\s+/g, '_')}_${ts}.xlsx`);
        } catch (e) {
          setError('Excel error: ' + e.message);
        }
      };

      const reset = () => {
        setStep(1);
        setTopic('');
        setKeywords([]);
        setSelectedWebsites(new Set());
        setResults(null);
        setProgress({ current: 0, total: 0, current_company: '', current_domain: '' });
        setError('');
      };

      return (
        <div className="container">
          <div className="header">
            <h1>Research Engine</h1>
            <span className="badge">BETA</span>
          </div>
          {error && <div className="alert alert-error">{error}</div>}

          {step === 1 && (
            <div>
              {loading && <div className="alert alert-info">⏳ Loading websites...</div>}
              <div className="form-group">
                <label>Research Topic</label>
                <input type="text" value={topic} onChange={e => setTopic(e.target.value)} onKeyPress={e => e.key === 'Enter' && expandTopic()} placeholder="e.g., liquid cooling, ball valves" disabled={expanding} />
                <button className="btn-primary" onClick={expandTopic} disabled={expanding || !topic.trim()}>
                  {expanding ? <><span className="spinner"></span> Expanding...</> : 'Expand topic'}
                </button>
              </div>
              <div className="form-group">
                <button className="btn-history" onClick={loadHistory} style={{width: '100%'}}>📋 View Search History</button>
              </div>
            </div>
          )}

          {step === 2 && (
            <div>
              <div className="form-group">
                <h2>Keywords for "{topic}"</h2>
                <div className="keywords">
                  {keywords.length > 0 ? keywords.map((k, i) => <span key={i} className="keyword">{k}</span>) : <span style={{ color: '#666' }}>No keywords</span>}
                </div>
              </div>

              <div className="form-group">
                <h3>Select Websites (up to 100)</h3>
                <p style={{ marginBottom: '12px' }}>Selected: {selectedWebsites.size}/100</p>
                <div className="website-selector">
                  {websites.map((w, i) => (
                    <div key={i} className="website-checkbox">
                      <input 
                        type="checkbox" 
                        id={`site-${i}`}
                        checked={selectedWebsites.has(i)} 
                        onChange={() => toggleWebsite(i)}
                        disabled={!selectedWebsites.has(i) && selectedWebsites.size >= 100}
                      />
                      <label htmlFor={`site-${i}`}>
                        <strong>{w.name}</strong><br/>
                        <span style={{color: '#0066cc', fontSize: '12px'}}>{w.domain}</span>
                      </label>
                    </div>
                  ))}
                </div>
              </div>

              <div className="button-group">
                <button className="btn-secondary" onClick={() => setStep(1)}>Back</button>
                <button className="btn-primary" onClick={search} disabled={selectedWebsites.size === 0}>
                  {searching ? <><span className="spinner"></span> Searching...</> : `Search ${selectedWebsites.size} Sites`}
                </button>
              </div>
            </div>
          )}

          {searching && (
            <div className="progress-container">
              <div className="progress-text">🔍 Searching {selectedWebsites.size} websites...</div>
              <div className="progress-bar">
                <div className="progress-fill" style={{ width: `${progress.total > 0 ? (progress.current / progress.total) * 100 : 0}%` }}>
                  {progress.total > 0 ? `${progress.current}/${progress.total}` : ''}
                </div>
              </div>
              <div className="progress-meta">
                {progress.total > 0 ? `${Math.round((progress.current / progress.total) * 100)}% Complete` : 'Starting...'}
              </div>
              {progress.current_company && (
                <div className="company-now">
                  <strong>📍 Now Searching:</strong><br/>
                  {progress.current_company}<br/>
                  <span style={{fontSize: '12px', color: '#666'}}>{progress.current_domain}</span>
                </div>
              )}
            </div>
          )}

          {step === 3 && results && !searching && (
            <div>
              <div className="alert alert-success">
                <strong>✓ Complete!</strong> {results.results.length} results from {results.websiteCount} companies
              </div>
              <div style={{ marginBottom: '24px', display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
                <div>
                  <h2>{results.topic}</h2>
                  <p>{results.searchDate}</p>
                </div>
                <button className="btn-download" onClick={() => downloadExcel(results)}>📥 Download Excel</button>
              </div>
              <div style={{ overflowX: 'auto' }}>
                <table className="results-table">
                  <thead>
                    <tr>
                      <th>Company</th>
                      <th>Website</th>
                      <th>Summary</th>
                      <th>Date</th>
                      <th>Links</th>
                    </tr>
                  </thead>
                  <tbody>
                    {results.results.map((r, i) => (
                      <tr key={i}>
                        <td><strong>{r.companyName}</strong></td>
                        <td><a href={`https://${r.domain}`} target="_blank" rel="noopener" style={{ color: '#0066cc' }}>{r.domain}</a></td>
                        <td>{r.summary}</td>
                        <td>{r.dateFound}</td>
                        <td>{r.citationLinks}</td>
                      </tr>
                    ))}
                  </tbody>
                </table>
              </div>
              <div className="button-group">
                <button className="btn-secondary" onClick={reset}>New Search</button>
                <button className="btn-download" onClick={() => downloadExcel(results)}>📥 Download Excel</button>
              </div>
            </div>
          )}

          {step === 4 && (
            <div>
              <h2>Search History</h2>
              {history.length === 0 ? (
                <div className="alert alert-info">No searches yet</div>
              ) : (
                <div className="history-list">
                  {history.map((h, i) => (
                    <div key={i} className="history-item" onClick={() => {
                      setResults({ topic: h.topic, results: h.results_data, searchDate: new Date(h.search_date).toLocaleDateString(), websiteCount: h.websites_searched.length });
                      setStep(3);
                    }}>
                      <div className="history-item-title">{h.topic}</div>
                      <div className="history-item-meta">{h.websites_searched.length} websites • {new Date(h.search_date).toLocaleDateString()}</div>
                    </div>
                  ))}
                </div>
              )}
              <div className="button-group" style={{marginTop: '24px'}}>
                <button className="btn-secondary" onClick={() => setStep(1)}>Back</button>
              </div>
            </div>
          )}
        </div>
      );
    }
    ReactDOM.render(<App />, document.getElementById('root'));
  </script>
</body>
</html>
