<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Flow Reps Research Tool</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
      background: #f5f5f5;
      color: #1a1a1a;
    }
    #root {
      min-height: 100vh;
      padding: 20px;
    }
  </style>
</head>
<body>
  <div id="root"></div>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script type="text/babel">
    const { useState, useEffect } = React;

    function ResearchTool() {
      const [topic, setTopic] = useState('');
      const [expandedTopic, setExpandedTopic] = useState(null);
      const [keywords, setKeywords] = useState([]);
      const [currentPrompt, setCurrentPrompt] = useState('');
      const [websites, setWebsites] = useState([]);
      const [selectedWebsites, setSelectedWebsites] = useState(new Set());
      const [results, setResults] = useState(null);
      const [expandingTopic, setExpandingTopic] = useState(false);
      const [searching, setSearching] = useState(false);
      const [error, setError] = useState('');
      const [loadingWebsites, setLoadingWebsites] = useState(true);
      const [savedLists, setSavedLists] = useState([]);
      const [loadingSavedLists, setLoadingSavedLists] = useState(true);
      const [savingList, setSavingList] = useState(false);
      const [listName, setListName] = useState('');
      const [showSaveListForm, setShowSaveListForm] = useState(false);

      useEffect(() => {
        const fetchWebsites = async () => {
          try {
            const response = await fetch('https://flow-reps-research-tool-production.up.railway.app/websites');
            if (!response.ok) {
              throw new Error('Failed to fetch websites');
            }
            const data = await response.json();
            setWebsites(data.websites || []);
          } catch (err) {
            setError(`Error loading websites: ${err.message}`);
            setWebsites([]);
          } finally {
            setLoadingWebsites(false);
          }
        };

        const fetchSavedLists = async () => {
          try {
            const response = await fetch('https://flow-reps-research-tool-production.up.railway.app/saved-lists');
            if (!response.ok) {
              throw new Error('Failed to fetch saved lists');
            }
            const data = await response.json();
            setSavedLists(data.lists || []);
          } catch (err) {
            console.log('Could not load saved lists:', err.message);
            setSavedLists([]);
          } finally {
            setLoadingSavedLists(false);
          }
        };

        fetchWebsites();
        fetchSavedLists();
      }, []);

      const expandTopic = async () => {
        if (!topic.trim()) {
          setError('Please enter a topic');
          return;
        }

        setExpandingTopic(true);
        setError('');

        try {
          const response = await fetch('https://flow-reps-research-tool-production.up.railway.app/research', {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json'
            },
            body: JSON.stringify({
              action: 'expandTopic',
              topic: topic.trim(),
            }),
          });

          if (!response.ok) {
            const errorData = await response.json();
            throw new Error(errorData.error || 'Failed to expand topic');
          }

          const data = await response.json();
          const keywordArray = data.result.split(',').map(k => k.trim()).filter(k => k);
          
          setExpandedTopic(topic);
          setKeywords(keywordArray);
          setSelectedWebsites(new Set());
          setCurrentPrompt('');
          setShowSaveListForm(false);
        } catch (err) {
          setError(`Error: ${err.message}`);
        } finally {
          setExpandingTopic(false);
        }
      };

      const toggleWebsite = (idx) => {
        const newSet = new Set(selectedWebsites);
        if (newSet.has(idx)) newSet.delete(idx);
        else newSet.add(idx);
        setSelectedWebsites(newSet);
      };

      const generatePrompt = () => {
        if (selectedWebsites.size === 0) {
          setError('Please select at least one website');
          return;
        }

        const selectedWebsitesList = Array.from(selectedWebsites).map(i => websites[i]);
        const sites = selectedWebsitesList.map(w => `${w.name} (${w.domain})`).join(', ');
        const keys = keywords.join(', ');

        const promptText = `Search these websites for content related to: "${expandedTopic}"

Websites to search: ${sites}

Keywords to look for: ${keys}

IMPORTANT INSTRUCTIONS:
1. If relevant content is found, state what was found up front (e.g., "A white paper titled..." or "A product page titled...")
2. Extract a 1-3 sentence summary of the content
3. If the website alludes to the company being a leader or subject matter expert in data center engineering, start with "SME ALERT: DATA CENTER ENGINEERING" before the findings
4. Format findings as numbered list with specific document/page titles
5. Include reference numbers in brackets if citing specific sections

If the website alludes to expertise in data center engineering, liquid cooling, advanced thermal solutions, or similar areas, include SME ALERT at the top.

Format example:
SME ALERT: DATA CENTER ENGINEERING

1. A white paper titled "[Title]" was found. [1-3 sentence summary][1]
2. A product page titled "[Title]" was found. [1-3 sentence summary][2]

If no relevant information is found, respond ONLY with: No Updates Found`;

        setCurrentPrompt(promptText);
      };

      const runSearch = async () => {
        if (!currentPrompt) {
          generatePrompt();
          return;
        }

        if (selectedWebsites.size === 0) {
          setError('Please select at least one website');
          return;
        }

        setSearching(true);
        setError('');

        try {
          const selectedWebsitesList = Array.from(selectedWebsites).map(i => websites[i]);

          const response = await fetch('https://flow-reps-research-tool-production.up.railway.app/research', {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json'
            },
            body: JSON.stringify({
              action: 'search',
              topic: expandedTopic,
              keywords,
              websites: selectedWebsitesList,
            }),
          });

          if (!response.ok) {
            const errorData = await response.json();
            throw new Error(errorData.error || 'Search failed');
          }

          const data = await response.json();
          
          setResults({
            topic: expandedTopic,
            keywords,
            websites: selectedWebsitesList,
            findings: data.result,
            timestamp: new Date().toLocaleString(),
          });
        } catch (err) {
          setError(`Search error: ${err.message}`);
        } finally {
          setSearching(false);
        }
      };

      const saveList = async () => {
        if (!listName.trim()) {
          setError('Please enter a list name');
          return;
        }

        if (selectedWebsites.size === 0) {
          setError('Please select at least one website');
          return;
        }

        setSavingList(true);
        setError('');

        try {
          const selectedWebsitesList = Array.from(selectedWebsites).map(i => websites[i]);

          const response = await fetch('https://flow-reps-research-tool-production.up.railway.app/save-list', {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json'
            },
            body: JSON.stringify({
              name: listName.trim(),
              websites: selectedWebsitesList,
            }),
          });

          if (!response.ok) {
            const errorData = await response.json();
            throw new Error(errorData.error || 'Failed to save list');
          }

          setListName('');
          setShowSaveListForm(false);
          
          const listsResponse = await fetch('https://flow-reps-research-tool-production.up.railway.app/saved-lists');
          if (listsResponse.ok) {
            const data = await listsResponse.json();
            setSavedLists(data.lists || []);
          }

          alert(`List saved successfully!`);
        } catch (err) {
          setError(`Error saving list: ${err.message}`);
        } finally {
          setSavingList(false);
        }
      };

      const loadList = (list) => {
        const indices = new Set();
        list.websites.forEach(savedWebsite => {
          const index = websites.findIndex(w => w.domain === savedWebsite.domain);
          if (index !== -1) {
            indices.add(index);
          }
        });
        setSelectedWebsites(indices);
      };

      const reset = () => {
        setTopic('');
        setExpandedTopic(null);
        setKeywords([]);
        setSelectedWebsites(new Set());
        setResults(null);
        setError('');
        setCurrentPrompt('');
        setListName('');
        setShowSaveListForm(false);
      };

      return (
        <div style={{ maxWidth: '700px', margin: '0 auto' }}>
          <h1 style={{ fontSize: '28px', fontWeight: '500', marginBottom: '24px' }}>Research tool</h1>

          {!results ? (
            <div>
              {!expandedTopic && savedLists.length > 0 && (
                <div style={{ marginBottom: '24px', padding: '12px', backgroundColor: '#f0f9ff', borderRadius: '6px', border: '1px solid #cce5ff' }}>
                  <h3 style={{ fontSize: '14px', fontWeight: '500', marginBottom: '12px', color: '#0066cc' }}>Saved Website Lists</h3>
                  <div style={{ display: 'flex', flexWrap: 'wrap', gap: '8px' }}>
                    {savedLists.map((list, idx) => (
                      <button
                        key={idx}
                        onClick={() => loadList(list)}
                        style={{
                          padding: '8px 12px',
                          backgroundColor: '#0066cc',
                          color: 'white',
                          border: 'none',
                          borderRadius: '6px',
                          fontSize: '12px',
                          cursor: 'pointer',
                        }}
                      >
                        {list.name} ({list.websites.length})
                      </button>
                    ))}
                  </div>
                </div>
              )}

              <div style={{ marginBottom: '24px' }}>
                <label style={{ display: 'block', marginBottom: '8px', fontWeight: '500', fontSize: '14px' }}>
                  Research topic
                </label>
                <input
                  type="text"
                  value={topic}
                  onChange={(e) => setTopic(e.target.value)}
                  onKeyPress={(e) => e.key === 'Enter' && expandTopic()}
                  placeholder="e.g., Liquid cooling for data centers"
                  style={{
                    width: '100%',
                    padding: '10px 12px',
                    border: '1px solid #ddd',
                    borderRadius: '6px',
                    fontSize: '14px',
                    marginBottom: '12px',
                  }}
                />
                <button
                  onClick={expandTopic}
                  disabled={expandingTopic || !topic.trim()}
                  style={{
                    padding: '10px 16px',
                    backgroundColor: expandingTopic ? '#ccc' : '#0066cc',
                    color: 'white',
                    border: 'none',
                    borderRadius: '6px',
                    fontSize: '14px',
                    fontWeight: '500',
                    cursor: expandingTopic || !topic.trim() ? 'not-allowed' : 'pointer',
                  }}
                >
                  {expandingTopic ? 'Expanding...' : 'Expand topic'}
                </button>
              </div>

              {error && (
                <div style={{ padding: '12px', backgroundColor: '#ffe6e6', color: '#cc0000', borderRadius: '6px', fontSize: '14px', marginBottom: '24px' }}>
                  {error}
                </div>
              )}

              {expandedTopic && (
                <div style={{ marginBottom: '24px' }}>
                  {currentPrompt && (
                    <div style={{ marginBottom: '24px', padding: '12px', backgroundColor: '#fff9e6', borderRadius: '6px', border: '1px solid #ffe699' }}>
                      <h3 style={{ fontSize: '14px', fontWeight: '500', marginBottom: '8px', color: '#cc8800' }}>Prompt</h3>
                      <pre style={{ fontSize: '11px', whiteSpace: 'pre-wrap', wordWrap: 'break-word', color: '#333' }}>
                        {currentPrompt}
                      </pre>
                    </div>
                  )}

                  <h2 style={{ fontSize: '16px', fontWeight: '500', marginBottom: '12px' }}>Keywords for "{expandedTopic}"</h2>
                  <div style={{ padding: '12px', backgroundColor: '#f0f0f0', borderRadius: '6px', marginBottom: '24px' }}>
                    <div style={{ display: 'flex', flexWrap: 'wrap', gap: '8px' }}>
                      {keywords.map((kw, idx) => (
                        <span
                          key={idx}
                          style={{
                            padding: '6px 12px',
                            backgroundColor: '#e6f2ff',
                            color: '#0066cc',
                            borderRadius: '12px',
                            fontSize: '13px',
                          }}
                        >
                          {kw}
                        </span>
                      ))}
                    </div>
                  </div>

                  <h2 style={{ fontSize: '16px', fontWeight: '500', marginBottom: '12px' }}>Select websites to search ({websites.length} available)</h2>
                  
                  {loadingWebsites ? (
                    <div style={{ padding: '12px', textAlign: 'center', color: '#666' }}>Loading websites...</div>
                  ) : websites.length === 0 ? (
                    <div style={{ padding: '12px', textAlign: 'center', color: '#666' }}>No websites found.</div>
                  ) : (
                    <div style={{ border: '1px solid #ddd', borderRadius: '6px', backgroundColor: '#f9f9f9', overflow: 'hidden', marginBottom: '24px', maxHeight: '400px', overflowY: 'auto' }}>
                      {websites.map((website, idx) => (
                        <div
                          key={idx}
                          onClick={() => toggleWebsite(idx)}
                          style={{
                            display: 'flex',
                            alignItems: 'center',
                            gap: '12px',
                            padding: '12px',
                            borderBottom: idx < websites.length - 1 ? '1px solid #eee' : 'none',
                            cursor: 'pointer',
                            backgroundColor: selectedWebsites.has(idx) ? '#e6f2ff' : 'transparent',
                          }}
                        >
                          <input
                            type="checkbox"
                            checked={selectedWebsites.has(idx)}
                            onChange={() => {}}
                            style={{ cursor: 'pointer', margin: 0 }}
                          />
                          <div style={{ flex: 1 }}>
                            <div style={{ fontWeight: '500', fontSize: '14px' }}>{website.name}</div>
                            <div style={{ fontSize: '12px', color: '#666' }}>{website.domain}</div>
                          </div>
                        </div>
                      ))}
                    </div>
                  )}

                  {showSaveListForm && selectedWebsites.size > 0 && (
                    <div style={{ marginBottom: '24px', padding: '12px', backgroundColor: '#f0f9ff', borderRadius: '6px', border: '1px solid #cce5ff' }}>
                      <h3 style={{ fontSize: '14px', fontWeight: '500', marginBottom: '8px' }}>Save this selection as a list</h3>
                      <div style={{ display: 'flex', gap: '8px' }}>
                        <input
                          type="text"
                          value={listName}
                          onChange={(e) => setListName(e.target.value)}
                          placeholder="e.g., Data Center Companies"
                          style={{
                            flex: 1,
                            padding: '8px 12px',
                            border: '1px solid #cce5ff',
                            borderRadius: '6px',
                            fontSize: '14px',
                          }}
                        />
                        <button
                          onClick={saveList}
                          disabled={savingList || !listName.trim()}
                          style={{
                            padding: '8px 16px',
                            backgroundColor: savingList ? '#ccc' : '#0066cc',
                            color: 'white',
                            border: 'none',
                            borderRadius: '6px',
                            fontSize: '14px',
                            fontWeight: '500',
                            cursor: savingList || !listName.trim() ? 'not-allowed' : 'pointer',
                          }}
                        >
                          {savingList ? 'Saving...' : 'Save'}
                        </button>
                      </div>
                    </div>
                  )}

                  <div style={{ display: 'flex', gap: '8px', marginBottom: '12px' }}>
                    <button
                      onClick={() => { setTopic(''); setExpandedTopic(null); setKeywords([]); setSelectedWebsites(new Set()); setError(''); setCurrentPrompt(''); setShowSaveListForm(false); }}
                      style={{
                        padding: '10px 16px',
                        backgroundColor: 'white',
                        color: '#666',
                        border: '1px solid #ddd',
                        borderRadius: '6px',
                        fontSize: '14px',
                        cursor: 'pointer',
                      }}
                    >
                      Change topic
                    </button>
                    <button
                      onClick={runSearch}
                      disabled={searching || selectedWebsites.size === 0}
                      style={{
                        padding: '10px 16px',
                        backgroundColor: searching ? '#ccc' : '#0066cc',
                        color: 'white',
                        border: 'none',
                        borderRadius: '6px',
                        fontSize: '14px',
                        fontWeight: '500',
                        cursor: searching || selectedWebsites.size === 0 ? 'not-allowed' : 'pointer',
                        flex: 1,
                      }}
                    >
                      {searching ? 'Searching...' : currentPrompt ? 'Search websites' : 'Show prompt'}
                    </button>
                  </div>

                  {selectedWebsites.size > 0 && (
                    <button
                      onClick={() => setShowSaveListForm(!showSaveListForm)}
                      style={{
                        padding: '8px 12px',
                        backgroundColor: 'white',
                        color: '#0066cc',
                        border: '1px solid #0066cc',
                        borderRadius: '6px',
                        fontSize: '13px',
                        cursor: 'pointer',
                      }}
                    >
                      {showSaveListForm ? 'Cancel save' : 'Save this list'}
                    </button>
                  )}
                </div>
              )}
            </div>
          ) : (
            <div>
              <div style={{ marginBottom: '24px' }}>
                <h2 style={{ fontSize: '18px', fontWeight: '500', marginBottom: '8px' }}>Results for "{results.topic}"</h2>
                <p style={{ fontSize: '13px', color: '#666', margin: 0 }}>{results.timestamp}</p>
              </div>

              <div style={{
                padding: '16px',
                backgroundColor: '#f9f9f9',
                borderRadius: '6px',
                border: '1px solid #ddd',
                marginBottom: '24px',
                whiteSpace: 'pre-wrap',
                wordWrap: 'break-word',
                fontSize: '13px',
                lineHeight: '1.6',
                color: '#1a1a1a',
              }}>
                {results.findings}
              </div>

              <button
                onClick={reset}
                style={{
                  padding: '10px 16px',
                  backgroundColor: '#0066cc',
                  color: 'white',
                  border: 'none',
                  borderRadius: '6px',
                  fontSize: '14px',
                  fontWeight: '500',
                  cursor: 'pointer',
                }}
              >
                New research
              </button>
            </div>
          )}
        </div>
      );
    }

    ReactDOM.render(<ResearchTool />, document.getElementById('root'));
  </script>
</body>
</html>
