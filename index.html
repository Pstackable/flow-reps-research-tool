<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Flow Reps Research Engine - TEST</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f5f5f5; color: #1a1a1a; }
    #root { min-height: 100vh; padding: 20px; }
    .progress-bar { width: 100%; height: 12px; background-color: #e0e0e0; border-radius: 6px; overflow: hidden; margin-bottom: 12px; }
    .progress-bar-fill { height: 100%; background-color: #0066cc; animation: pulse 1s infinite; }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.7; } }
  </style>
</head>
<body>
  <div id="root"></div>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script type="text/babel">
    const { useState, useEffect } = React;

    function ResearchEngine() {
      const [step, setStep] = useState(1);
      const [topic, setTopic] = useState('');
      const [expandedTopic, setExpandedTopic] = useState(null);
      const [keywords, setKeywords] = useState([]);
      const [websites, setWebsites] = useState([]);
      const [selectedWebsites, setSelectedWebsites] = useState(new Set());
      const [results, setResults] = useState(null);
      const [expandingTopic, setExpandingTopic] = useState(false);
      const [searching, setSearching] = useState(false);
      const [error, setError] = useState('');
      const [loadingWebsites, setLoadingWebsites] = useState(true);

      useEffect(() => {
        const fetchWebsites = async () => {
          try {
            console.log('Fetching websites...');
            const response = await fetch('https://flow-reps-research-tool-production.up.railway.app/websites');
            console.log('Response status:', response.status);
            if (!response.ok) throw new Error('Failed to fetch websites');
            const data = await response.json();
            console.log('Websites loaded:', data.websites?.length, 'websites');
            console.log('First website sample:', data.websites?.[0]);
            setWebsites(data.websites || []);
          } catch (err) {
            console.error('Error loading websites:', err);
            setError(`Error loading websites: ${err.message}`);
          } finally {
            setLoadingWebsites(false);
          }
        };
        fetchWebsites();
      }, []);

      const expandTopic = async () => {
        if (!topic.trim()) { setError('Please enter a topic'); return; }
        setExpandingTopic(true);
        setError('');

        try {
          const response = await fetch('https://flow-reps-research-tool-production.up.railway.app/research', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ action: 'expandTopic', topic: topic.trim() }),
          });

          if (!response.ok) throw new Error('Failed to expand topic');
          const data = await response.json();
          const keywordArray = data.result.split(',').map(k => k.trim()).filter(k => k);
          
          setExpandedTopic(topic);
          setKeywords(keywordArray);
          
          const newSet = new Set();
          for (let i = 0; i < Math.min(10, websites.length); i++) {
            newSet.add(i);
          }
          setSelectedWebsites(newSet);
          
          setStep(2);
        } catch (err) {
          setError(`Error: ${err.message}`);
        } finally {
          setExpandingTopic(false);
        }
      };

      const runSearch = async () => {
        if (selectedWebsites.size === 0) { setError('Please select at least one website'); return; }
        setSearching(true);
        setError('');

        try {
          const selectedWebsitesList = Array.from(selectedWebsites).map(i => websites[i]);
          console.log('Sending search for websites:', selectedWebsitesList);

          const response = await fetch('https://flow-reps-research-tool-production.up.railway.app/research', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              action: 'search',
              topic: expandedTopic,
              keywords,
              websites: selectedWebsitesList,
            }),
          });

          if (!response.ok) throw new Error(`Search failed: ${response.statusText}`);
          const data = await response.json();
          
          setResults({
            topic: expandedTopic,
            findings: data.result,
            websiteList: selectedWebsitesList.map(w => `${w.name} (${w.domain})`).join('\n'),
            websiteCount: selectedWebsitesList.length,
            timestamp: new Date().toLocaleString(),
          });

          setStep(3);
        } catch (err) {
          console.error('Search error:', err);
          setError(`Search error: ${err.message}`);
        } finally {
          setSearching(false);
        }
      };

      const reset = () => {
        setStep(1);
        setTopic('');
        setExpandedTopic(null);
        setKeywords([]);
        setSelectedWebsites(new Set());
        setResults(null);
        setError('');
      };

      return (
        <div style={{ maxWidth: '1000px', margin: '0 auto' }}>
          <div style={{ display: 'flex', alignItems: 'center', marginBottom: '24px', gap: '12px' }}>
            <h1 style={{ fontSize: '32px', fontWeight: '600', margin: 0 }}>Research Engine</h1>
            <span style={{ backgroundColor: '#ffeb3b', color: '#000', padding: '4px 12px', borderRadius: '12px', fontSize: '12px', fontWeight: '600' }}>TEST - 10 WEBSITES</span>
          </div>

          {error && <div style={{ padding: '12px', backgroundColor: '#ffe6e6', color: '#cc0000', borderRadius: '6px', fontSize: '14px', marginBottom: '24px' }}>{error}</div>}

          {step === 1 && (
            <div>
              {loadingWebsites && <div style={{ padding: '12px', backgroundColor: '#d1ecf1', color: '#0c5460', borderRadius: '6px', marginBottom: '12px' }}>Loading {websites.length} websites...</div>}
              
              <div style={{ marginBottom: '24px' }}>
                <label style={{ display: 'block', marginBottom: '8px', fontWeight: '500', fontSize: '14px' }}>Research topic</label>
                <input type="text" value={topic} onChange={(e) => setTopic(e.target.value)} onKeyPress={(e) => e.key === 'Enter' && expandTopic()} placeholder="e.g., Liquid cooling for data centers" style={{ width: '100%', padding: '10px 12px', border: '1px solid #ddd', borderRadius: '6px', fontSize: '14px', marginBottom: '12px' }} />
                <button onClick={expandTopic} disabled={expandingTopic || !topic.trim()} style={{ padding: '10px 16px', backgroundColor: expandingTopic ? '#ccc' : '#0066cc', color: 'white', border: 'none', borderRadius: '6px', fontSize: '14px', fontWeight: '500', cursor: expandingTopic ? 'not-allowed' : 'pointer' }}>
                  {expandingTopic ? 'Expanding...' : 'Expand topic'}
                </button>
              </div>
            </div>
          )}

          {step === 2 && (
            <div>
              <div style={{ marginBottom: '24px', padding: '12px', backgroundColor: '#fff3cd', borderRadius: '6px', border: '1px solid #ffc107' }}>
                <strong>ℹ️ TEST MODE:</strong> Auto-selected first 10 websites (total available: {websites.length})
              </div>

              <div style={{ marginBottom: '24px' }}>
                <h2 style={{ fontSize: '16px', fontWeight: '500', marginBottom: '12px' }}>Keywords for "{expandedTopic}"</h2>
                <div style={{ padding: '12px', backgroundColor: '#f0f0f0', borderRadius: '6px' }}>
                  <div style={{ display: 'flex', flexWrap: 'wrap', gap: '8px' }}>
                    {keywords.length > 0 ? keywords.map((kw, idx) => <span key={idx} style={{ padding: '6px 12px', backgroundColor: '#e6f2ff', color: '#0066cc', borderRadius: '12px', fontSize: '13px' }}>{kw}</span>) : <span style={{ color: '#666' }}>No keywords</span>}
                  </div>
                </div>
              </div>

              <div style={{ marginBottom: '24px' }}>
                <h3 style={{ fontSize: '14px', fontWeight: '500', marginBottom: '12px' }}>Selected Websites ({selectedWebsites.size}):</h3>
                <div style={{ padding: '12px', backgroundColor: '#f9f9f9', borderRadius: '6px', border: '1px solid #ddd', maxHeight: '300px', overflow: 'auto' }}>
                  {selectedWebsites.size > 0 ? (
                    Array.from(selectedWebsites).map(idx => (
                      <div key={idx} style={{ fontSize: '12px', padding: '8px 0', borderBottom: '1px solid #eee' }}>
                        ✓ <strong>{websites[idx]?.name}</strong><br/>
                        <span style={{ color: '#0066cc' }}>{websites[idx]?.domain}</span>
                      </div>
                    ))
                  ) : (
                    <div style={{ color: '#666' }}>No websites selected</div>
                  )}
                </div>
              </div>

              <div style={{ display: 'flex', gap: '8px' }}>
                <button onClick={() => setStep(1)} style={{ padding: '10px 16px', backgroundColor: 'white', color: '#666', border: '1px solid #ddd', borderRadius: '6px', fontSize: '14px', cursor: 'pointer' }}>Back</button>
                <button onClick={runSearch} disabled={searching || selectedWebsites.size === 0} style={{ padding: '10px 16px', backgroundColor: searching ? '#ccc' : '#0066cc', color: 'white', border: 'none', borderRadius: '6px', fontSize: '14px', fontWeight: '500', cursor: searching ? 'not-allowed' : 'pointer', flex: 1 }}>
                  {searching ? 'Searching...' : 'Search'}
                </button>
              </div>
            </div>
          )}

          {step === 3 && results && (
            <div>
              <div style={{ marginBottom: '24px', padding: '12px', backgroundColor: '#d4edda', borderRadius: '6px', border: '1px solid #28a745' }}>
                <strong style={{ color: '#155724' }}>✓ Search Complete!</strong> Searched {results.websiteCount} websites
              </div>

              <div style={{ marginBottom: '24px' }}>
                <h2 style={{ fontSize: '18px', fontWeight: '500', marginBottom: '8px' }}>Results for "{results.topic}"</h2>
                <p style={{ fontSize: '13px', color: '#666', margin: 0 }}>{results.timestamp}</p>
              </div>

              <div style={{ marginBottom: '24px', padding: '12px', backgroundColor: '#f0f0f0', borderRadius: '6px' }}>
                <strong style={{ fontSize: '13px' }}>Websites searched:</strong>
                <pre style={{ fontSize: '12px', color: '#666', margin: '8px 0 0 0', whiteSpace: 'pre-wrap', wordWrap: 'break-word' }}>{results.websiteList}</pre>
              </div>

              <div style={{ border: '2px solid #333', borderRadius: '6px', marginBottom: '24px', overflow: 'hidden' }}>
                <div style={{ backgroundColor: '#333', color: 'white', padding: '12px', fontWeight: '500', fontSize: '14px' }}>📄 Raw Results from Perplexity ({results.findings.length} characters)</div>
                <div style={{ backgroundColor: '#000', color: '#0f0', padding: '16px', maxHeight: '700px', overflow: 'auto', whiteSpace: 'pre-wrap', wordWrap: 'break-word', fontSize: '12px', lineHeight: '1.5', fontFamily: 'Courier New, monospace' }}>
                  {results.findings}
                </div>
              </div>

              <button onClick={reset} style={{ width: '100%', padding: '10px 16px', backgroundColor: '#0066cc', color: 'white', border: 'none', borderRadius: '6px', fontSize: '14px', fontWeight: '500', cursor: 'pointer' }}>
                Try another topic
              </button>
            </div>
          )}
        </div>
      );
    }

    ReactDOM.render(<ResearchEngine />, document.getElementById('root'));
  </script>
</body>
</html>
