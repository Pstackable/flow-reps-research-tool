<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Flow Reps Research Engine</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f5f5f5;
      color: #1a1a1a;
    }
    #root {
      min-height: 100vh;
      padding: 20px;
    }
    .tabs {
      display: flex;
      gap: 0;
      margin-bottom: 24px;
      border-bottom: 2px solid #ddd;
    }
    .tab-button {
      padding: 12px 20px;
      background: none;
      border: none;
      border-bottom: 3px solid transparent;
      font-size: 14px;
      fontWeight: 500;
      cursor: pointer;
      color: #666;
    }
    .tab-button.active {
      color: #0066cc;
      border-bottom-color: #0066cc;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      backgroundColor: white;
    }
    th {
      padding: 12px;
      textAlign: left;
      backgroundColor: #f0f0f0;
      fontWeight: 600;
      borderBottom: 1px solid #ddd;
    }
    td {
      padding: 12px;
      borderBottom: 1px solid #eee;
    }
    tr:hover {
      backgroundColor: #f9f9f9;
    }
  </style>
</head>
<body>
  <div id="root"></div>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script type="text/babel">
    const { useState, useEffect } = React;

    function ResearchEngine() {
      const [activeTab, setActiveTab] = useState('search');
      const [topic, setTopic] = useState('');
      const [expandedTopic, setExpandedTopic] = useState(null);
      const [keywords, setKeywords] = useState([]);
      const [currentPrompt, setCurrentPrompt] = useState('');
      const [promptExpanded, setPromptExpanded] = useState(true);
      const [websites, setWebsites] = useState([]);
      const [filteredWebsites, setFilteredWebsites] = useState([]);
      const [filterText, setFilterText] = useState('');
      const [selectedWebsites, setSelectedWebsites] = useState(new Set());
      const [results, setResults] = useState(null);
      const [expandingTopic, setExpandingTopic] = useState(false);
      const [searching, setSearching] = useState(false);
      const [error, setError] = useState('');
      const [loadingWebsites, setLoadingWebsites] = useState(true);
      const [savedLists, setSavedLists] = useState([]);
      const [savingList, setSavingList] = useState(false);
      const [listName, setListName] = useState('');

      useEffect(() => {
        const fetchWebsites = async () => {
          try {
            const response = await fetch('https://flow-reps-research-tool-production.up.railway.app/websites');
            if (!response.ok) throw new Error('Failed to fetch websites');
            const data = await response.json();
            setWebsites(data.websites || []);
            setFilteredWebsites(data.websites || []);
          } catch (err) {
            setError(`Error loading websites: ${err.message}`);
          } finally {
            setLoadingWebsites(false);
          }
        };

        const fetchSavedLists = async () => {
          try {
            const response = await fetch('https://flow-reps-research-tool-production.up.railway.app/saved-lists');
            if (response.ok) {
              const data = await response.json();
              setSavedLists(data.lists || []);
            }
          } catch (err) {
            console.log('Could not load saved lists');
          }
        };

        fetchWebsites();
        fetchSavedLists();
      }, []);

      useEffect(() => {
        const filtered = websites.filter(w => 
          w.name.toLowerCase().includes(filterText.toLowerCase()) ||
          w.domain.toLowerCase().includes(filterText.toLowerCase())
        );
        setFilteredWebsites(filtered);
      }, [filterText, websites]);

      const expandTopic = async () => {
        if (!topic.trim()) {
          setError('Please enter a topic');
          return;
        }

        setExpandingTopic(true);
        setError('');

        try {
          const response = await fetch('https://flow-reps-research-tool-production.up.railway.app/research', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ action: 'expandTopic', topic: topic.trim() }),
          });

          if (!response.ok) throw new Error('Failed to expand topic');
          const data = await response.json();
          const keywordArray = data.result.split(',').map(k => k.trim()).filter(k => k);
          
          setExpandedTopic(topic);
          setKeywords(keywordArray);
          setCurrentPrompt('');
          setPromptExpanded(true);
          setActiveTab('websites');
        } catch (err) {
          setError(`Error: ${err.message}`);
        } finally {
          setExpandingTopic(false);
        }
      };

      const generatePrompt = () => {
        if (selectedWebsites.size === 0) {
          setError('Please select at least one website');
          return;
        }

        const selectedWebsitesList = Array.from(selectedWebsites).map(i => websites[i]);
        const sites = selectedWebsitesList.map(w => `${w.name} (${w.domain})`).join(', ');
        const keys = keywords.join(', ');

        const promptText = `Search these websites for content related to: "${expandedTopic}"

Websites to search: ${sites}

Keywords to look for: ${keys}

IMPORTANT INSTRUCTIONS:
1. If relevant content is found, state what was found up front
2. Extract a 1-3 sentence summary
3. If the website alludes to expertise in data center engineering, start with "SME ALERT: DATA CENTER ENGINEERING"
4. Format findings as numbered list
5. Include reference numbers in brackets

If no relevant information is found, respond ONLY with: No Updates Found`;

        setCurrentPrompt(promptText);
      };

      const toggleWebsite = (idx) => {
        const newSet = new Set(selectedWebsites);
        const actualIdx = websites.findIndex(w => w === filteredWebsites[idx]);
        if (newSet.has(actualIdx)) newSet.delete(actualIdx);
        else newSet.add(actualIdx);
        setSelectedWebsites(newSet);
      };

      const selectAll = () => {
        const newSet = new Set();
        filteredWebsites.forEach((w, i) => {
          const actualIdx = websites.indexOf(w);
          newSet.add(actualIdx);
        });
        setSelectedWebsites(newSet);
      };

      const selectNone = () => {
        setSelectedWebsites(new Set());
      };

      const runSearch = async () => {
        if (!currentPrompt) {
          generatePrompt();
          return;
        }

        if (selectedWebsites.size === 0) {
          setError('Please select at least one website');
          return;
        }

        setSearching(true);
        setError('');

        try {
          const selectedWebsitesList = Array.from(selectedWebsites).map(i => websites[i]);

          const response = await fetch('https://flow-reps-research-tool-production.up.railway.app/research', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              action: 'search',
              topic: expandedTopic,
              keywords,
              websites: selectedWebsitesList,
            }),
          });

          if (!response.ok) throw new Error('Search failed');
          const data = await response.json();
          
          setResults({
            topic: expandedTopic,
            keywords,
            websites: selectedWebsitesList,
            findings: data.result,
            timestamp: new Date().toLocaleString(),
          });
          setActiveTab('results');
        } catch (err) {
          setError(`Search error: ${err.message}`);
        } finally {
          setSearching(false);
        }
      };

      const saveList = async () => {
        if (!listName.trim()) {
          setError('Please enter a list name');
          return;
        }
        if (selectedWebsites.size === 0) {
          setError('Please select at least one website');
          return;
        }

        setSavingList(true);
        setError('');

        try {
          const selectedWebsitesList = Array.from(selectedWebsites).map(i => websites[i]);

          const response = await fetch('https://flow-reps-research-tool-production.up.railway.app/save-list', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ name: listName.trim(), websites: selectedWebsitesList }),
          });

          if (!response.ok) throw new Error('Failed to save list');

          setListName('');
          const listsResponse = await fetch('https://flow-reps-research-tool-production.up.railway.app/saved-lists');
          if (listsResponse.ok) {
            const data = await listsResponse.json();
            setSavedLists(data.lists || []);
          }

          alert('List saved successfully!');
        } catch (err) {
          setError(`Error saving list: ${err.message}`);
        } finally {
          setSavingList(false);
        }
      };

      const deleteList = async (listToDelete) => {
        if (!confirm(`Delete "${listToDelete.name}"?`)) return;
        
        try {
          const listsResponse = await fetch('https://flow-reps-research-tool-production.up.railway.app/saved-lists');
          if (listsResponse.ok) {
            const data = await listsResponse.json();
            const filtered = data.lists.filter(l => l.name !== listToDelete.name);
            setSavedLists(filtered);
          }
        } catch (err) {
          setError(`Error deleting list: ${err.message}`);
        }
      };

      const loadList = (list) => {
        const indices = new Set();
        list.websites.forEach(savedWebsite => {
          const index = websites.findIndex(w => w.domain === savedWebsite.domain);
          if (index !== -1) indices.add(index);
        });
        setSelectedWebsites(indices);
      };

      const reset = () => {
        setTopic('');
        setExpandedTopic(null);
        setKeywords([]);
        setSelectedWebsites(new Set());
        setResults(null);
        setError('');
        setCurrentPrompt('');
        setListName('');
        setActiveTab('search');
      };

      return (
        <div style={{ maxWidth: '1000px', margin: '0 auto' }}>
          <h1 style={{ fontSize: '32px', fontWeight: '600', marginBottom: '24px' }}>Research Engine</h1>

          {!results ? (
            <div>
              {/* Tab Navigation */}
              <div style={{ display: 'flex', gap: 0, marginBottom: '24px', borderBottom: '2px solid #ddd' }}>
                <button
                  onClick={() => setActiveTab('search')}
                  style={{
                    padding: '12px 20px',
                    background: 'none',
                    border: 'none',
                    borderBottom: activeTab === 'search' ? '3px solid #0066cc' : '3px solid transparent',
                    fontSize: '14px',
                    fontWeight: '500',
                    cursor: 'pointer',
                    color: activeTab === 'search' ? '#0066cc' : '#666',
                  }}
                >
                  Search
                </button>
                <button
                  onClick={() => setActiveTab('websites')}
                  style={{
                    padding: '12px 20px',
                    background: 'none',
                    border: 'none',
                    borderBottom: activeTab === 'websites' ? '3px solid #0066cc' : '3px solid transparent',
                    fontSize: '14px',
                    fontWeight: '500',
                    cursor: 'pointer',
                    color: activeTab === 'websites' ? '#0066cc' : '#666',
                  }}
                >
                  Websites
                </button>
              </div>

              {error && (
                <div style={{ padding: '12px', backgroundColor: '#ffe6e6', color: '#cc0000', borderRadius: '6px', fontSize: '14px', marginBottom: '24px' }}>
                  {error}
                </div>
              )}

              {/* Search Tab */}
              {activeTab === 'search' && (
                <div>
                  <div style={{ marginBottom: '24px' }}>
                    <label style={{ display: 'block', marginBottom: '8px', fontWeight: '500', fontSize: '14px' }}>
                      Research topic
                    </label>
                    <input
                      type="text"
                      value={topic}
                      onChange={(e) => setTopic(e.target.value)}
                      onKeyPress={(e) => e.key === 'Enter' && expandTopic()}
                      placeholder="e.g., Liquid cooling for data centers"
                      style={{
                        width: '100%',
                        padding: '10px 12px',
                        border: '1px solid #ddd',
                        borderRadius: '6px',
                        fontSize: '14px',
                        marginBottom: '12px',
                      }}
                    />
                    <button
                      onClick={expandTopic}
                      disabled={expandingTopic || !topic.trim()}
                      style={{
                        padding: '10px 16px',
                        backgroundColor: expandingTopic ? '#ccc' : '#0066cc',
                        color: 'white',
                        border: 'none',
                        borderRadius: '6px',
                        fontSize: '14px',
                        fontWeight: '500',
                        cursor: expandingTopic ? 'not-allowed' : 'pointer',
                      }}
                    >
                      {expandingTopic ? 'Expanding...' : 'Expand topic'}
                    </button>
                  </div>

                  {expandedTopic && (
                    <div>
                      {/* Collapsible Prompt */}
                      {currentPrompt && (
                        <div style={{ marginBottom: '24px', padding: '12px', backgroundColor: '#fff9e6', borderRadius: '6px', border: '1px solid #ffe699' }}>
                          <button
                            onClick={() => setPromptExpanded(!promptExpanded)}
                            style={{
                              width: '100%',
                              textAlign: 'left',
                              padding: '12px',
                              backgroundColor: 'transparent',
                              border: 'none',
                              fontSize: '14px',
                              fontWeight: '500',
                              color: '#cc8800',
                              cursor: 'pointer',
                            }}
                          >
                            {promptExpanded ? '▼' : '▶'} Prompt
                          </button>
                          {promptExpanded && (
                            <pre style={{ fontSize: '11px', whiteSpace: 'pre-wrap', wordWrap: 'break-word', color: '#333', marginTop: '8px' }}>
                              {currentPrompt}
                            </pre>
                          )}
                        </div>
                      )}

                      {/* Keywords */}
                      <h2 style={{ fontSize: '16px', fontWeight: '500', marginBottom: '12px' }}>Keywords for "{expandedTopic}"</h2>
                      <div style={{ padding: '12px', backgroundColor: '#f0f0f0', borderRadius: '6px', marginBottom: '24px' }}>
                        <div style={{ display: 'flex', flexWrap: 'wrap', gap: '8px' }}>
                          {keywords.map((kw, idx) => (
                            <span
                              key={idx}
                              style={{
                                padding: '6px 12px',
                                backgroundColor: '#e6f2ff',
                                color: '#0066cc',
                                borderRadius: '12px',
                                fontSize: '13px',
                              }}
                            >
                              {kw}
                            </span>
                          ))}
                        </div>
                      </div>
                    </div>
                  )}
                </div>
              )}

              {/* Websites Tab */}
              {activeTab === 'websites' && expandedTopic && (
                <div>
                  {/* Saved Lists */}
                  {savedLists.length > 0 && (
                    <div style={{ marginBottom: '24px', padding: '12px', backgroundColor: '#f0f9ff', borderRadius: '6px', border: '1px solid #cce5ff' }}>
                      <h3 style={{ fontSize: '14px', fontWeight: '500', marginBottom: '12px', color: '#0066cc' }}>Saved Lists</h3>
                      <div style={{ display: 'flex', flexWrap: 'wrap', gap: '8px' }}>
                        {savedLists.map((list, idx) => (
                          <div key={idx} style={{ display: 'flex', alignItems: 'center', gap: '8px', padding: '8px 12px', backgroundColor: '#0066cc', color: 'white', borderRadius: '6px', fontSize: '12px' }}>
                            <button
                              onClick={() => loadList(list)}
                              style={{
                                background: 'none',
                                border: 'none',
                                color: 'white',
                                cursor: 'pointer',
                                fontSize: '12px',
                              }}
                            >
                              {list.name} ({list.websites.length})
                            </button>
                            <button
                              onClick={() => deleteList(list)}
                              style={{
                                background: 'none',
                                border: 'none',
                                color: 'white',
                                cursor: 'pointer',
                                fontSize: '16px',
                                padding: '0',
                              }}
                            >
                              ✕
                            </button>
                          </div>
                        ))}
                      </div>
                    </div>
                  )}

                  {/* Filter */}
                  <div style={{ marginBottom: '24px' }}>
                    <label style={{ display: 'block', marginBottom: '8px', fontWeight: '500', fontSize: '14px' }}>Filter</label>
                    <input
                      type="text"
                      value={filterText}
                      onChange={(e) => setFilterText(e.target.value)}
                      placeholder="Filter by name or domain..."
                      style={{
                        width: '100%',
                        padding: '10px 12px',
                        border: '1px solid #ddd',
                        borderRadius: '6px',
                        fontSize: '14px',
                      }}
                    />
                  </div>

                  {/* Select All / None */}
                  <div style={{ marginBottom: '12px', display: 'flex', gap: '12px', alignItems: 'center' }}>
                    <button
                      onClick={selectAll}
                      style={{
                        color: '#0066cc',
                        background: 'none',
                        border: 'none',
                        cursor: 'pointer',
                        fontSize: '14px',
                        fontWeight: '500',
                      }}
                    >
                      Select All (filtered)
                    </button>
                    <button
                      onClick={selectNone}
                      style={{
                        color: '#0066cc',
                        background: 'none',
                        border: 'none',
                        cursor: 'pointer',
                        fontSize: '14px',
                        fontWeight: '500',
                      }}
                    >
                      Select None
                    </button>
                    <span style={{ marginLeft: 'auto', fontSize: '14px', color: '#666' }}>
                      {selectedWebsites.size} selected
                    </span>
                  </div>

                  {/* Websites Table */}
                  {loadingWebsites ? (
                    <div style={{ textAlign: 'center', color: '#666', padding: '24px' }}>Loading websites...</div>
                  ) : (
                    <div style={{ border: '1px solid #ddd', borderRadius: '6px', overflow: 'hidden', marginBottom: '24px' }}>
                      <table>
                        <thead>
                          <tr>
                            <th style={{ width: '40px' }}>
                              <input type="checkbox" style={{ cursor: 'pointer' }} />
                            </th>
                            <th>Name</th>
                            <th>Domain</th>
                          </tr>
                        </thead>
                        <tbody>
                          {filteredWebsites.map((website, idx) => {
                            const actualIdx = websites.indexOf(website);
                            return (
                              <tr key={idx}>
                                <td>
                                  <input
                                    type="checkbox"
                                    checked={selectedWebsites.has(actualIdx)}
                                    onChange={() => toggleWebsite(idx)}
                                    style={{ cursor: 'pointer' }}
                                  />
                                </td>
                                <td style={{ fontWeight: '500' }}>{website.name}</td>
                                <td>{website.domain}</td>
                              </tr>
                            );
                          })}
                        </tbody>
                      </table>
                    </div>
                  )}

                  {/* Save List */}
                  {selectedWebsites.size > 0 && (
                    <div style={{ marginBottom: '24px', padding: '12px', backgroundColor: '#f0f9ff', borderRadius: '6px', border: '1px solid #cce5ff' }}>
                      <h3 style={{ fontSize: '14px', fontWeight: '500', marginBottom: '12px' }}>Save Selected As List</h3>
                      <div style={{ display: 'flex', gap: '8px' }}>
                        <input
                          type="text"
                          value={listName}
                          onChange={(e) => setListName(e.target.value)}
                          placeholder="e.g., Valve OEMs"
                          style={{
                            flex: 1,
                            padding: '10px 12px',
                            border: '1px solid #cce5ff',
                            borderRadius: '6px',
                            fontSize: '14px',
                          }}
                        />
                        <button
                          onClick={saveList}
                          disabled={savingList || !listName.trim()}
                          style={{
                            padding: '10px 16px',
                            backgroundColor: savingList ? '#ccc' : '#0066cc',
                            color: 'white',
                            border: 'none',
                            borderRadius: '6px',
                            fontSize: '14px',
                            fontWeight: '500',
                            cursor: savingList ? 'not-allowed' : 'pointer',
                          }}
                        >
                          {savingList ? 'Saving...' : 'Save List'}
                        </button>
                      </div>
                    </div>
                  )}

                  {/* Action Buttons */}
                  <div style={{ display: 'flex', gap: '8px' }}>
                    <button
                      onClick={() => setActiveTab('search')}
                      style={{
                        padding: '10px 16px',
                        backgroundColor: 'white',
                        color: '#666',
                        border: '1px solid #ddd',
                        borderRadius: '6px',
                        fontSize: '14px',
                        cursor: 'pointer',
                      }}
                    >
                      Back to Search
                    </button>
                    <button
                      onClick={runSearch}
                      disabled={searching || selectedWebsites.size === 0}
                      style={{
                        padding: '10px 16px',
                        backgroundColor: searching ? '#ccc' : '#0066cc',
                        color: 'white',
                        border: 'none',
                        borderRadius: '6px',
                        fontSize: '14px',
                        fontWeight: '500',
                        cursor: searching ? 'not-allowed' : 'pointer',
                        flex: 1,
                      }}
                    >
                      {searching ? 'Searching...' : currentPrompt ? 'Search websites' : 'Show prompt'}
                    </button>
                  </div>
                </div>
              )}

              {activeTab === 'websites' && !expandedTopic && (
                <div style={{ textAlign: 'center', padding: '24px', color: '#666' }}>
                  Please search a topic first
                </div>
              )}
            </div>
          ) : (
            <div>
              <div style={{ marginBottom: '24px' }}>
                <h2 style={{ fontSize: '18px', fontWeight: '500', marginBottom: '8px' }}>Results for "{results.topic}"</h2>
                <p style={{ fontSize: '13px', color: '#666', margin: 0 }}>{results.timestamp}</p>
              </div>

              <div style={{
                padding: '16px',
                backgroundColor: '#f9f9f9',
                borderRadius: '6px',
                border: '1px solid #ddd',
                marginBottom: '24px',
                whiteSpace: 'pre-wrap',
                wordWrap: 'break-word',
                fontSize: '13px',
                lineHeight: '1.6',
              }}>
                {results.findings}
              </div>

              <button
                onClick={reset}
                style={{
                  padding: '10px 16px',
                  backgroundColor: '#0066cc',
                  color: 'white',
                  border: 'none',
                  borderRadius: '6px',
                  fontSize: '14px',
                  fontWeight: '500',
                  cursor: 'pointer',
                }}
              >
                New research
              </button>
            </div>
          )}
        </div>
      );
    }

    ReactDOM.render(<ResearchEngine />, document.getElementById('root'));
  </script>
</body>
</html>
