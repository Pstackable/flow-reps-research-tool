<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Flow Reps Research Engine - TEST</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { 
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; 
      background: #f5f5f5; 
      color: #1a1a1a; 
    }
    #root { min-height: 100vh; padding: 20px; }
    .container { max-width: 1000px; margin: 0 auto; }
    .header { display: flex; align-items: center; gap: 12px; margin-bottom: 24px; }
    .header h1 { font-size: 32px; font-weight: 600; margin: 0; }
    .badge { background-color: #ffeb3b; color: #000; padding: 4px 12px; border-radius: 12px; font-size: 12px; font-weight: 600; }
    .alert { padding: 12px; border-radius: 6px; margin-bottom: 24px; font-size: 14px; }
    .alert-error { background-color: #ffe6e6; color: #cc0000; }
    .alert-info { background-color: #d1ecf1; color: #0c5460; }
    .alert-success { background-color: #d4edda; color: #155724; }
    .alert-warning { background-color: #fff3cd; color: #856404; border: 1px solid #ffc107; }
    .form-group { margin-bottom: 24px; }
    .form-group label { display: block; margin-bottom: 8px; font-weight: 500; font-size: 14px; }
    input[type="text"] { 
      width: 100%; 
      padding: 10px 12px; 
      border: 1px solid #ddd; 
      border-radius: 6px; 
      font-size: 14px; 
      margin-bottom: 12px; 
    }
    button { 
      padding: 10px 16px; 
      border: none; 
      border-radius: 6px; 
      font-size: 14px; 
      font-weight: 500; 
      cursor: pointer; 
    }
    .btn-primary { background-color: #0066cc; color: white; }
    .btn-primary:disabled { background-color: #ccc; cursor: not-allowed; }
    .btn-secondary { background-color: white; color: #666; border: 1px solid #ddd; }
    .keywords { display: flex; flex-wrap: wrap; gap: 8px; padding: 12px; background-color: #f0f0f0; border-radius: 6px; }
    .keyword { padding: 6px 12px; background-color: #e6f2ff; color: #0066cc; border-radius: 12px; font-size: 13px; }
    .website-list { padding: 12px; background-color: #f9f9f9; border-radius: 6px; border: 1px solid #ddd; max-height: 300px; overflow: auto; }
    .website-item { font-size: 12px; padding: 8px 0; border-bottom: 1px solid #eee; }
    .website-name { font-weight: 500; }
    .website-domain { color: #0066cc; font-size: 11px; }
    .raw-results { border: 2px solid #333; border-radius: 6px; margin-bottom: 24px; overflow: hidden; }
    .raw-header { background-color: #333; color: white; padding: 12px; font-weight: 500; font-size: 14px; }
    .raw-content { 
      background-color: #000; 
      color: #0f0; 
      padding: 16px; 
      max-height: 700px; 
      overflow: auto; 
      white-space: pre-wrap; 
      word-wrap: break-word; 
      font-size: 12px; 
      line-height: 1.5; 
      font-family: 'Courier New', monospace;
      min-height: 100px;
    }
    .button-group { display: flex; gap: 8px; }
    .button-group button { flex: 1; }
    h2 { font-size: 16px; font-weight: 500; margin-bottom: 12px; }
    h3 { font-size: 14px; font-weight: 500; margin-bottom: 12px; }
    p { font-size: 13px; color: #666; margin: 0; }
  </style>
</head>
<body>
  <div id="root"></div>
  
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  
  <script type="text/babel">
    const { useState, useEffect } = React;

    function App() {
      const [step, setStep] = useState(1);
      const [topic, setTopic] = useState('');
      const [expandedTopic, setExpandedTopic] = useState(null);
      const [keywords, setKeywords] = useState([]);
      const [websites, setWebsites] = useState([]);
      const [selectedWebsites, setSelectedWebsites] = useState(new Set());
      const [results, setResults] = useState(null);
      const [expandingTopic, setExpandingTopic] = useState(false);
      const [searching, setSearching] = useState(false);
      const [error, setError] = useState('');
      const [loadingWebsites, setLoadingWebsites] = useState(true);

      useEffect(() => {
        console.log('🚀 App starting...');
        fetchWebsites();
      }, []);

      const fetchWebsites = async () => {
        try {
          console.log('📥 Fetching websites from backend...');
          const response = await fetch('https://flow-reps-research-tool-production.up.railway.app/websites');
          console.log('📦 Response status:', response.status);
          
          if (!response.ok) throw new Error(`HTTP ${response.status}`);
          
          const data = await response.json();
          console.log('✅ Loaded', data.websites?.length, 'websites');
          
          if (data.websites && data.websites.length > 0) {
            console.log('Sample websites:', data.websites.slice(0, 3));
          }
          
          setWebsites(data.websites || []);
        } catch (err) {
          console.error('❌ Failed to load websites:', err);
          setError(`Error loading websites: ${err.message}`);
        } finally {
          setLoadingWebsites(false);
        }
      };

      const handleExpandTopic = async () => {
        if (!topic.trim()) {
          setError('Please enter a topic');
          return;
        }

        setExpandingTopic(true);
        setError('');

        try {
          console.log('\n📝 Expanding topic:', topic);
          
          const response = await fetch('https://flow-reps-research-tool-production.up.railway.app/research', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ 
              action: 'expandTopic', 
              topic: topic.trim() 
            }),
          });

          console.log('📦 Response status:', response.status);
          if (!response.ok) throw new Error(`HTTP ${response.status}`);
          
          const data = await response.json();
          console.log('✅ Response:', data.result);
          
          const keywordArray = data.result.split(',').map(k => k.trim()).filter(k => k);
          console.log('✅ Keywords extracted:', keywordArray);

          setExpandedTopic(topic);
          setKeywords(keywordArray);

          const newSet = new Set();
          for (let i = 0; i < Math.min(10, websites.length); i++) {
            newSet.add(i);
          }
          console.log('✅ Selected 10 websites for testing');
          setSelectedWebsites(newSet);

          setStep(2);
        } catch (err) {
          console.error('❌ Error:', err);
          setError(`Error: ${err.message}`);
        } finally {
          setExpandingTopic(false);
        }
      };

      const handleSearch = async () => {
        if (selectedWebsites.size === 0) {
          setError('No websites selected');
          return;
        }

        setSearching(true);
        setError('');

        try {
          const selectedWebsitesList = Array.from(selectedWebsites).map(i => websites[i]);

          console.log('\n' + '='.repeat(70));
          console.log('🔍 STARTING SEARCH');
          console.log('='.repeat(70));
          console.log('Topic:', expandedTopic);
          console.log('Keywords:', keywords);
          console.log('Number of websites:', selectedWebsitesList.length);
          console.log('\nWebsites to search:');
          selectedWebsitesList.forEach((w, i) => {
            console.log(`  ${i + 1}. ${w.name} (${w.domain})`);
          });
          console.log('='.repeat(70));

          const requestBody = {
            action: 'search',
            topic: expandedTopic,
            keywords,
            websites: selectedWebsitesList,
          };

          console.log('\n📤 Sending request to backend...');
          console.log('Request body:', JSON.stringify(requestBody, null, 2));

          const response = await fetch('https://flow-reps-research-tool-production.up.railway.app/research', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(requestBody),
          });

          console.log('📦 Response status:', response.status);

          if (!response.ok) {
            throw new Error(`HTTP ${response.status}`);
          }

          const data = await response.json();

          console.log('\n' + '='.repeat(70));
          console.log('📨 PERPLEXITY RESPONSE');
          console.log('='.repeat(70));
          console.log('Length:', data.result.length, 'characters');
          console.log('Content:');
          console.log(data.result);
          console.log('='.repeat(70) + '\n');

          setResults({
            topic: expandedTopic,
            findings: data.result,
            websiteList: selectedWebsitesList.map(w => `${w.name} (${w.domain})`).join('\n'),
            websiteCount: selectedWebsitesList.length,
            timestamp: new Date().toLocaleString(),
          });

          setStep(3);
        } catch (err) {
          console.error('❌ Search error:', err);
          setError(`Search error: ${err.message}`);
        } finally {
          setSearching(false);
        }
      };

      const handleReset = () => {
        setStep(1);
        setTopic('');
        setExpandedTopic(null);
        setKeywords([]);
        setSelectedWebsites(new Set());
        setResults(null);
        setError('');
      };

      return (
        <div className="container">
          <div className="header">
            <h1>Research Engine</h1>
            <span className="badge">TEST - 10 WEBSITES</span>
          </div>

          {error && <div className="alert alert-error">{error}</div>}

          {step === 1 && (
            <div>
              {loadingWebsites && (
                <div className="alert alert-info">
                  ⏳ Loading {websites.length} websites... Check console (F12) for details
                </div>
              )}

              <div className="form-group">
                <label>Research topic</label>
                <input
                  type="text"
                  value={topic}
                  onChange={(e) => setTopic(e.target.value)}
                  onKeyPress={(e) => e.key === 'Enter' && handleExpandTopic()}
                  placeholder="e.g., ball valves, liquid cooling, valves"
                />
                <button 
                  className="btn-primary" 
                  onClick={handleExpandTopic}
                  disabled={expandingTopic || !topic.trim()}
                >
                  {expandingTopic ? 'Expanding...' : 'Expand topic'}
                </button>
              </div>

              <div className="alert alert-warning">
                <strong>💡 How to test:</strong><br/>
                1. Enter "ball valves" or "liquid cooling"<br/>
                2. Click "Expand topic"<br/>
                3. Review auto-selected 10 websites<br/>
                4. Click "Search"<br/>
                5. Open DevTools (F12) to see detailed logs
              </div>
            </div>
          )}

          {step === 2 && (
            <div>
              <div className="alert alert-warning">
                <strong>ℹ️ TEST MODE:</strong> Automatically selected first 10 websites (Total available: {websites.length})
              </div>

              <div className="form-group">
                <h2>Keywords for "{expandedTopic}"</h2>
                <div className="keywords">
                  {keywords.length > 0 ? (
                    keywords.map((kw, idx) => (
                      <span key={idx} className="keyword">{kw}</span>
                    ))
                  ) : (
                    <span style={{ color: '#666' }}>No keywords</span>
                  )}
                </div>
              </div>

              <div className="form-group">
                <h3>Selected Websites ({selectedWebsites.size})</h3>
                <div className="website-list">
                  {selectedWebsites.size > 0 ? (
                    Array.from(selectedWebsites).map(idx => (
                      <div key={idx} className="website-item">
                        <div className="website-name">✓ {websites[idx]?.name}</div>
                        <div className="website-domain">{websites[idx]?.domain}</div>
                      </div>
                    ))
                  ) : (
                    <div style={{ color: '#666' }}>No websites selected</div>
                  )}
                </div>
              </div>

              <div className="button-group">
                <button className="btn-secondary" onClick={() => setStep(1)}>Back</button>
                <button 
                  className="btn-primary"
                  onClick={handleSearch}
                  disabled={searching || selectedWebsites.size === 0}
                >
                  {searching ? 'Searching...' : 'Search'}
                </button>
              </div>
            </div>
          )}

          {step === 3 && results && (
            <div>
              <div className="alert alert-success">
                <strong>✓ Search Complete!</strong> Searched {results.websiteCount} websites
              </div>

              <h2>Results for "{results.topic}"</h2>
              <p>{results.timestamp}</p>

              <div style={{ marginBottom: '24px', padding: '12px', backgroundColor: '#f0f0f0', borderRadius: '6px' }}>
                <strong style={{ fontSize: '13px' }}>Websites searched:</strong>
                <pre style={{ fontSize: '12px', color: '#666', margin: '8px 0 0 0', whiteSpace: 'pre-wrap', wordWrap: 'break-word', fontFamily: 'monospace' }}>
                  {results.websiteList}
                </pre>
              </div>

              <div className="raw-results">
                <div className="raw-header">📄 Raw Results from Perplexity ({results.findings.length} characters)</div>
                <div className="raw-content">{results.findings}</div>
              </div>

              <div className="alert alert-info">
                <strong>💡 Debugging:</strong> Check DevTools Console (F12) to see the full request/response logs
              </div>

              <button className="btn-primary" onClick={handleReset} style={{ width: '100%' }}>
                Try another topic
              </button>
            </div>
          )}
        </div>
      );
    }

    ReactDOM.render(<App />, document.getElementById('root'));
  </script>
</body>
</html>
